<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - SmartBookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #1a73e8; --primary-hover: #1557b0; --success: #34a853; --danger: #ea4335; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #3c4043; }
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #5f6368; font-weight: 600; transition: color 0.2s; }
        .nav-links a:hover { color: var(--primary); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .account-header { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 30px; display: flex; align-items: center; gap: 30px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #4285f4); display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; flex-shrink: 0; }
        .user-info h1 { font-size: 24px; margin-bottom: 10px; color: #202124; }
        .user-info p { color: #5f6368; margin-bottom: 5px; font-size: 14px; }
        .user-status { display: inline-block; padding: 4px 12px; background: #e6f4ea; color: var(--success); border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px; }
        .section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 30px; }
        .section h2 { font-size: 18px; margin-bottom: 20px; color: #202124; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .section h2 i { color: var(--primary); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary); text-align: center; }
        .stat-card .number { font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .stat-card .label { font-size: 12px; color: #5f6368; font-weight: 600; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #feeef3; color: var(--danger); }
        .btn-secondary { background: #f1f3f4; color: #5f6368; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .activity-item { padding: 15px; border-left: 3px solid #e8eaed; margin-bottom: 15px; background: #f8f9fa; border-radius: 4px; }
        .activity-item.success { border-left-color: var(--success); }
        .activity-time { font-size: 12px; color: #5f6368; }
        .activity-desc { font-size: 14px; color: #3c4043; margin-top: 5px; font-weight: 500; }
        @media (max-width: 768px) { .account-header { flex-direction: column; text-align: center; } }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f3f3f3; border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SMART BOOKSHELF</a>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> ပင်မစာမျက်နှာ</a>
            <a href="library.html"><i class="fas fa-book"></i> စာကြည့်တိုက်</a>
            <a href="account.html"><i class="fas fa-user"></i> အကောင့်</a>
        </div>
    </nav>

    <div class="container">
        <div class="account-header" id="accountHeader">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="user-info">
                <h1 id="userName">Loading...</h1>
                <p id="userEmail">-</p>
                <p id="userCreated">-</p>
                <div class="user-status"><i class="fas fa-check-circle"></i> အကောင့်သည် ရှင်းလင်းပါသည်</div>
            </div>
        </div>

        <div class="section">
            <h2><i class="fas fa-chart-bar"></i> အကျဉ်းချုပ်စာရင်းအင်း</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number" id="downloadCount">0</div>
                    <div class="label">ဒေါင်းလုဒ်ထားသည်</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="favoriteCount">0</div>
                    <div class="label">အသဲပေးထားသည်</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2><i class="fas fa-history"></i> လုပ်ဆောင်ချက်မှတ်တမ်း</h2>
            <div id="activityLog">
                <p style="text-align: center; color: #5f6368;">မှတ်တမ်းများ ဆွဲယူနေသည်...</p>
            </div>
        </div>

        <div class="section" style="border-left: 4px solid var(--danger);">
            <h2 style="border-bottom-color: var(--danger); color: var(--danger);"><i class="fas fa-exclamation-triangle"></i> အန္တရာယ်ဆိုင်ရာ</h2>
            <div class="button-group">
                <button class="btn btn-danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> ထွက်မည်</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mituedqotwbmporkwbqf.supabase.co"; 
        const SB_KEY = "sb_publishable_gIcm03LyduvN6WgwZek4_Q_ePBBJBUc";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }
            currentUser = session.user;
            updateUserHeader(currentUser);
            await loadStats();
            await loadActivityLog();
        };

        function updateUserHeader(user) {
            document.getElementById('userName').textContent = user.email.split('@')[0] || 'User';
            document.getElementById('userEmail').textContent = user.email;
            const created = new Date(user.created_at).toLocaleDateString('my-MM');
            document.getElementById('userCreated').textContent = `အကောင့်ဖွင့်သည့်နေ့: ${created}`;
        }

        async function loadStats() {
            try {
                const { count: dlCount } = await sb.from('user_downloads').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
                const { count: favCount } = await sb.from('user_likes').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
                document.getElementById('downloadCount').textContent = dlCount || 0;
                document.getElementById('favoriteCount').textContent = favCount || 0;
            } catch (err) { console.error(err); }
        }

        async function loadActivityLog() {
            try {
                const { data: downloads, error } = await sb.from('user_downloads').select('created_at, books(title)').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(10);
                if (error) throw error;
                const logHtml = downloads && downloads.length > 0 
                    ? downloads.map(item => `
                        <div class="activity-item success">
                            <div class="activity-time">${new Date(item.created_at).toLocaleString('my-MM')}</div>
                            <div class="activity-desc"><i class="fas fa-download"></i> "${item.books?.title || 'Unknown'}" ဒေါင်းလုဒ်ခဲ့သည်</div>
                        </div>
                    `).join('')
                    : '<p style="text-align: center; color: #5f6368;">လုပ်ဆောင်ချက်မှတ်တမ်း မရှိသေးပါ။</p>';
                document.getElementById('activityLog').innerHTML = logHtml;
            } catch (err) { console.error(err); }
        }

        async function handleLogout() {
            await sb.auth.signOut();
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
