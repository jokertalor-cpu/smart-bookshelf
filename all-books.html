       .pagination-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin: 50px 0;
    flex-wrap: wrap; /* Mobile မှာ ဆန့်အောင် */
}

.page-btn {
    min-width: 40px;
    height: 40px;
    padding: 0 10px;
    border: 1px solid #ddd;
    background: #fff;
    color: #333;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.2s;
}

.page-btn:hover:not(:disabled) {
    border-color: var(--primary-blue);
    color: var(--primary-blue);
}

.page-btn.active {
    background: var(--primary-blue);
    color: white;
    border-color: var(--primary-blue);
}

.page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
        .sort-info {
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--dark-blue);
        }
    </style>
