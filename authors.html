<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bookshelf - Search Authors</title>
    <link rel="stylesheet" href="mainstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .authors-page-container { padding: 80px 15px 20px; max-width: 1000px; margin: 0 auto; }
        
        /* Search Section */
        .search-area { position: relative; margin-bottom: 30px; z-index: 100; }
        .author-input-wrapper { position: relative; display: flex; align-items: center; }
        .author-input-wrapper i { position: absolute; left: 15px; color: #888; }
       
        /* Author Search Input ကို Edge Style ပြောင်းခြင်း */
.author-search-input {
    width: 100%;
    /* ညာဘက်မှာ ပုံအတွက် 50px နေရာချန်ထားပါ */
    padding: 12px 50px 12px 40px !important; 
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
    
    /* ပုံကို ညာဘက်အစွန်း ကွက်တိကပ်စေရန် */
    background-repeat: no-repeat;
    background-position: right center; 
    background-size: contain; /* ပုံကို Search Bar အမြင့်အတိုင်း အပြည့်ယူစေရန် */
}

/* စာရိုက်တဲ့အခါ ပုံနောက်ခံအရောင်နဲ့ လိုက်ဖက်အောင် */
.author-search-input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}
        .author-search-input:focus { border-color: #2196F3; box-shadow: 0 0 8px rgba(33, 150, 243, 0.2); }

        /* Suggestion Box */
        .author-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .suggestion-item:hover { background-color: #f0f7ff; color: #2196F3; }

        /* Results Grid */
        .author-results-section {
            margin-top: 20px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            min-height: 300px;
        }
        .author-books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .book-info { padding: 8px; text-align: center; }
        .book-title { font-size: 13px; font-weight: bold; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* Suggestion Box Scrollbar ကို ပိုလှအောင် လုပ်ခြင်း */
.author-suggestions::-webkit-scrollbar {
    width: 6px;
}
.author-suggestions::-webkit-scrollbar-track {
    background: #f1f1f1;
}
.author-suggestions::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}
.author-suggestions::-webkit-scrollbar-thumb:hover {
    background: #2196F3;
}
/* Mobile Responsive အပြင်အဆင် */
@media (max-width: 600px) {
    .authors-page-container {
        padding: 70px 10px 20px; /* ဘေး margin လျှော့လိုက်မယ် */
    }

    .author-books-grid {
        /* ဖုန်းမှာ တစ်တန်းကို ၂ အုပ်စီ သေချာပေါ်အောင် လုပ်ခြင်း */
        grid-template-columns: repeat(2, 1fr); 
        gap: 12px; /* စာအုပ်ကြားအကွာအဝေးကို ကျဉ်းလိုက်မယ် */
    }

    .book-card img {
        height: 220px; /* ပုံအမြင့်ကို ပုံသေထားပြီး aspect-ratio ထိန်းမယ် */
        width: 100%;
        object-fit: cover;
    }

    .book-title {
        font-size: 12px; /* ဖုန်းမှာ စာလုံးအရွယ်အစား လျှော့မယ် */
        -webkit-line-clamp: 2; /* စာကြောင်း ၂ ကြောင်းပဲ ပြမယ် */
    }

    .author-results-section {
        padding: 15px 10px;
    }

    .section-header h2 {
        font-size: 1.2rem; /* ခေါင်းစဉ်ကို ဖုန်းနဲ့ မျှအောင် လျှော့မယ် */
    }
}
@media (min-width: 601px) and (max-width: 900px) {
    .author-books-grid {
        grid-template-columns: repeat(3, 1fr);
    }
     #author-books-display {
        grid-template-columns: 1fr !important;
    }
}
    </style>
</head>
<body>
   <div class="menu-overlay" id="menu-overlay"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="logo">
                <img src="photo_2026-03-20_09-18-40.jpg" alt="logo">
            </div>

            <div class="search-wrapper">
               <div class="search-box" id="search-box">
    <input type="text" id="search-input" placeholder="စာအုပ်အမည်ဖြင့်ရှာရန်..." 
           oninput="handleInput(event)" 
           onkeydown="handleKeyDown(event)" 
           autocomplete="off">
    <div id="search-suggestions" class="search-suggestions"></div>
</div>
                <button id="search-trigger" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> HOME</a></li>
                <li><a href="categories.html"><i class="fa-solid fa-book"></i>စာအုပ်အမျိုးအစားများ</a></li> 
                <li><a href="authors.html"><i class="fa-solid fa-pen-nib"></i>AUTHORS</a></li>
                <li><a href="library.html"><i class="fa-solid fa-bookmark"></i> LIBRARY</a></li>
            </ul>
        </div>
    </nav>

    <div class="authors-page-container">
        <div class="section-header">
            <h2><i class="fa-solid fa-pen-nib"></i> စာရေးဆရာဖြင့် ရှာဖွေပါ</h2>
        </div>

        <div class="search-area">
            <div class="author-input-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="author-search" class="author-search-input" 
                       placeholder="စာရေးဆရာအမည် ရိုက်ထည့်ပါ..." 
                       oninput="handleAuthorInput()" 
                       onkeydown="handleAuthorKeyDown(event)" autocomplete="off">
            </div>
            <div id="author-suggestions" class="author-suggestions"></div>
        </div>

        <div class="author-results-section">
            <h3 id="result-title" style="color: #555;">ရှာဖွေမှု ရလဒ်များ</h3>
            <hr>
            <div id="author-books-display" class="author-books-grid">
                <p style="color: #999; grid-column: 1/-1; text-align: center; margin-top: 50px;">
                    စာရေးဆရာ အမည်ရိုက်နှိပ်ပြီး ရှာဖွေနိုင်ပါသည်။
                </p>
            </div>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>
<script> 
// --- Page စဖွင့်ချိန်မှာ စာရေးဆရာအားလုံးကို အက္ခရာစဉ်အလိုက် (PC မှာ နှစ်တန်း) ပြရန် ---
async function loadAllAuthors() {
    const displayContainer = document.getElementById('author-books-display');
    const resultTitle = document.getElementById('result-title');
    
    resultTitle.innerText = "စာရေးဆရာများ (က - အ)";

    try {
        const { data, error } = await supabase
            .from('books')
            .select('author');

        if (error) throw error;

        const uniqueAuthors = [...new Set(data.map(item => item.author))]
            .filter(a => a)
            .sort((a, b) => a.localeCompare(b, 'my'));

        if (uniqueAuthors.length === 0) {
            displayContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center;">စာရေးဆရာ မရှိသေးပါ။</p>`;
            return;
        }

        // List Style & Grid Layout (PC မှာ 2 columns, Mobile မှာ 1 column)
        displayContainer.style.display = "grid";
        displayContainer.style.gridTemplateColumns = "repeat(auto-fill, minmax(45%, 1fr))"; 
        displayContainer.style.gap = "0px 20px"; // ဘေးတိုက် ၂ တန်းကြား အကွာအဝေး

        displayContainer.innerHTML = uniqueAuthors.map(name => `
            <div class="author-list-item" 
                 style="padding: 12px 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer;"
                 onclick="showBooksByAuthor('${name.replace(/'/g, "\\\\")}')">
                <i class="fa-solid fa-user-pen" style="font-size: 13px; color: #4f46e5; margin-right: 12px;"></i>
                <span style="font-size: 15px;">${name}</span>
            </div>
        `).join('');

    } catch (err) {
        console.error("Load Authors Error:", err);
    }
}

// --- စာအုပ်များ ထုတ်ပြသည့် Function (Back Button ပါဝင်သည်) ---
async function showBooksByAuthor(authorName) {
    const displayContainer = document.getElementById('author-books-display');
    const resultTitle = document.getElementById('result-title');
    
    // Back Button ပါတဲ့ Title ပုံစံပြောင်းခြင်း
    resultTitle.innerHTML = `
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <span>"${authorName}" ၏ စာအုပ်များ</span>
            <button onclick="loadAllAuthors()" style="padding: 5px 12px; font-size: 13px; cursor: pointer; border-radius: 20px; border: 1px solid #4f46e5; background: white; color: #4f46e5;">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
        </div>
    `;

    displayContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px;"><i class="fas fa-spinner fa-spin"></i></div>`;

    try {
        const { data: filtered, error } = await supabase
            .from('books')
            .select('id, title, cover')
            .ilike('author', `%${authorName}%`); 

        if (error) throw error;

        // စာအုပ်ပြတဲ့အခါ Grid ပြန်ပြောင်းမယ်
        displayContainer.style.gridTemplateColumns = "repeat(auto-fill, minmax(140px, 1fr))";
        displayContainer.style.gap = "20px";

        if (filtered.length === 0) {
            displayContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center;">စာအုပ်ရှာမတွေ့ပါ။</p>`;
            return;
        }

        displayContainer.innerHTML = filtered.map(book => `
            <div class="book-card" onclick="location.href='detail.html?id=${book.id}'">
                <img src="${book.cover}" loading="lazy" onerror="this.src='https://via.placeholder.com/140x190?text=No+Cover'">
                <div class="book-info"><p class="book-title">${book.title}</p></div>
            </div>
        `).join('');
    } catch (err) {
        displayContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red;">အမှားအယွင်းရှိပါသည်။</p>`;
    }
}

// Page Load လုပ်တဲ့အခါ Icon ရော၊ စာရေးဆရာစာရင်းရော ခေါ်မယ်
document.addEventListener('DOMContentLoaded', () => {
    applyAuthorSearchIcon();
    loadAllAuthors(); // ဒီ Function အသစ်ကို ခေါ်ပေးပါ
});
// --- စာရေးဆရာ အမည်ရိုက်သည့်အခါ Suggestion ပြပေးရန် ---
async function handleAuthorInput() {
    const input = document.getElementById('author-search');
    const suggestionBox = document.getElementById('author-suggestions');
    const keyword = input.value.trim();

    // ၁။ စာရိုက်ကွက် အားသွားရင် (သို့) စာလုံးရေ ၂ လုံးအောက်ဆိုရင် ချက်ချင်းပိတ်
    if (keyword === "" || keyword.length < 2) {
        suggestionBox.innerHTML = '';
        suggestionBox.style.display = 'none';
        return; 
    }

    try {
        const { data, error } = await supabase
            .from('books')
            .select('author')
            .ilike('author', `%${keyword}%`)
            .limit(40);

        if (error) throw error;

        // ၂။ Database က data ပြန်လာချိန်မှာ User က စာတွေကို ဖျက်လိုက်ပြီလားဆိုတာ ထပ်စစ်မယ်
        const currentKeyword = document.getElementById('author-search').value.trim();
        if (currentKeyword === "" || currentKeyword.length < 2) {
            suggestionBox.innerHTML = '';
            suggestionBox.style.display = 'none';
            return;
        }

        // Unique ဖြစ်အောင်လုပ်ပြီး Filter လုပ်ခြင်း
        const matches = [...new Set(data.map(item => item.author))].filter(a => a);

        if (matches.length > 0) {
            suggestionBox.innerHTML = matches.map(name => `
                <div class="suggestion-item" onclick="selectAuthor('${name.replace(/'/g, "\\\\'")}')">
                    <i class="fas fa-user-edit" style="font-size: 12px; margin-right: 10px; color: #aaa;"></i>
                    ${name}
                </div>
            `).join('');
            suggestionBox.style.display = 'block';
        } else {
            suggestionBox.innerHTML = ''; // အဖြေမရှိရင်လည်း ရှင်းပေးရမယ်
            suggestionBox.style.display = 'none';
        }
    } catch (err) {
        console.error("Search Error:", err.message);
        suggestionBox.style.display = 'none';
    }
}
// --- Suggestion ကို နှိပ်လိုက်သည့်အခါ ---
function selectAuthor(name) {
    showBooksByAuthor(name); // အရင် စာအုပ်ရှာမည်
    clearAuthorSearchUI();   // ပြီးမှ Search Box ကို ရှင်းမည်
}

// --- Enter ခေါက်လိုက်သည့်အခါ ---
function handleAuthorKeyDown(event) {
    if (event.key === "Enter") {
        const val = event.target.value.trim();
        if (val !== "") {
            showBooksByAuthor(val);
            clearAuthorSearchUI();
        }
    }
}

// --- UI ရှင်းလင်းရေး Function ---
function clearAuthorSearchUI() {
    const suggestionBox = document.getElementById('author-suggestions');
    const authorInput = document.getElementById('author-search');
    
    suggestionBox.style.display = 'none';
    suggestionBox.innerHTML = '';
    authorInput.value = ''; // ရိုက်ထားတဲ့စာကို ဖျက်မည်
}




   
    // Suggestion box ပြင်ပကို နှိပ်ရင် ပိတ်ပေးမယ်
    document.addEventListener('click', (e) => {
        const searchArea = document.querySelector('.search-area');
        if (searchArea && !searchArea.contains(e.target)) {
            document.getElementById('author-suggestions').style.display = 'none';
        }
    });
    
// ပင်မ ရှာဖွေခြင်း Function (ဥပမာပြထားခြင်း)
function performSearch(name) {
    console.log("Searching for:", name);
    // ဤနေရာတွင် စာအုပ်စာရင်းထုတ်ပြသည့် Logic ကို ထည့်ပါ
    // ဥပမာ - fetchBooksByAuthor(name);
}
    async function applyAuthorSearchIcon() {
    const authorInput = document.querySelector('.author-search-input');
    if (!authorInput) return;

    try {
        // Seasonal Themes ထဲက Active ဖြစ်တာတွေ ယူမယ်
        const { data: themes } = await supabase.from('seasonal_themes').select('*').eq('is_active', true);
        if (!themes || themes.length === 0) return;

        const today = new Date();
        const mmdd = `${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        const month = today.getMonth() + 1;

        // ၁။ Festival အရင်ရှာ၊ မရှိရင် ရာသီအလိုက်ရှာ (Random logic)
        let pool = themes.filter(t => t.category === 'festival' && mmdd >= t.start_date && mmdd <= t.end_date);
        if (pool.length === 0) {
            const season = (month >= 3 && month <= 5) ? "summer" : (month >= 6 && month <= 10) ? "rainy" : "winter";
            pool = themes.filter(t => t.category === season);
        }

        if (pool.length > 0) {
            const selected = pool[Math.floor(Math.random() * pool.length)];
            // ညာဘက်အစွန်း ကပ်ရန် Style ထည့်ခြင်း
            authorInput.style.backgroundImage = `url('${selected.icon_url}')`;
        }
    } catch (e) {
        console.error("Author Icon Error:", e);
    }
}

// Page load တဲ့အခါ Run ခိုင်းပါ
document.addEventListener('DOMContentLoaded', applyAuthorSearchIcon);
</script>
