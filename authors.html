    <style>
          .search-wrapper {
    display: flex;
    align-items: center;
}

.search-box {
    width: 0;
    overflow: hidden;
    transition: width 0.3s ease;
}

.search-wrapper.active .search-box {
    width: 200px; /* စိတ်ကြိုက် width ထားနိုင်သည် */
    margin-right: 5px;
}
        .authors-page-container { padding: 80px 15px 20px; max-width: 1000px; margin: 0 auto; }
        
        /* Search Section */
        .search-area { position: relative; margin-bottom: 30px; z-index: 100; }
        .author-input-wrapper { position: relative; display: flex; align-items: center; }
        .author-input-wrapper i { position: absolute; left: 15px; color: #888; }
        .author-search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
        }

        /* Suggestion Box */
        .author-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:hover { background-color: #f0f7ff; color: #2196F3; }

        /* Author's Books Container (Custom Style) */
        .author-results-section {
            margin-top: 20px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            min-height: 300px;
        }
        .author-books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        /* mainscript.css နဲ့ ကိုက်ညီအောင် ပြန်ပြင်ခြင်း */
        .author-books-grid .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .author-books-grid .book-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .author-books-grid .book-info { padding: 8px; text-align: center; }
        .author-books-grid .book-title { 
            font-size: 13px; font-weight: bold; margin: 0; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
</head>
<body>
  <div class="menu-overlay" id="menu-overlay"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="logo">
                <img src="photo_2026-03-20_09-18-40.jpg" alt="logo">
            </div>

            <div class="search-wrapper">
    <div class="search-box" id="search-box">
        <input type="text" id="search-input" placeholder="စာအုပ်အမည်ဖြင့်ရှာရန်..." oninput="handleInput()" onkeydown="handleKeyDown(event)" autocomplete="off">
        <div id="search-suggestions" class="suggestions-list"></div>
    </div>
    <button id="search-trigger" class="search-btn">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>
</div>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> HOME</a></li>
                <li><a href="latest.html"><i class="fa-solid fa-book"></i> LATEST</a></li>
                <li><a href="authors.html"><i class="fa-solid fa-pen-nib"?></i>AUTHORS</a></li>
                 <li><a href="library.html" class="active"><i class="fa-solid fa-bookmark"></i> LIBRARY</a></li>
            </ul>
        </div>
    </nav>

    <div class="authors-page-container">
        <div class="section-header" style="margin-bottom: 20px;">
            <h2><i class="fa-solid fa-pen-nib"></i> စာရေးဆရာဖြင့် ရှာဖွေပါ</h2>
        </div>

        <div class="search-area">
            <div class="author-input-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="author-search" class="author-search-input" 
                       placeholder="စာရေးဆရာအမည် ရိုက်ထည့်ပါ..." 
                       oninput="handleAuthorInput()" 
                       onkeydown="handleAuthorKeyDown(event)" autocomplete="off">
            </div>
            <div id="author-suggestions" class="author-suggestions"></div>
        </div>

        <div class="author-results-section">
            <h3 id="result-title" style="color: #555;">ရှာဖွေမှု ရလဒ်များ</h3>
            <hr>
            <div id="author-books-display" class="author-books-grid">
                <p style="color: #999; grid-column: 1/-1; text-align: center; margin-top: 50px;">
                    စာရေးဆရာ အမည်ရိုက်နှိပ်ပြီး ရှာဖွေနိုင်ပါသည်။
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>

    <script>
        let allBooksData = []; 
        let uniqueAuthors = [];

        // ၁။ စာအုပ်ဒေတာအားလုံးကို ကြိုတင်ဆွဲထားမယ်
        async function initAuthorPage() {
            try {
                const { data, error } = await supabase.from('books').select('*');
                if (error) throw error;
                
                allBooksData = data;
                // Unique Author list လုပ်မယ်
                const authorsRaw = data.map(b => b.author).filter(a => a);
                uniqueAuthors = [...new Set(authorsRaw)].sort();
            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        // ၂။ Input ရိုက်တဲ့အခါ Suggestion ပြပေးမယ်
        function handleAuthorInput() {
            const input = document.getElementById('author-search');
            const suggestionBox = document.getElementById('author-suggestions');
            const keyword = input.value.toLowerCase().trim();

            if (keyword === "") {
                suggestionBox.style.display = 'none';
                return;
            }

            const matches = uniqueAuthors.filter(a => a.toLowerCase().includes(keyword));

            if (matches.length > 0) {
                suggestionBox.innerHTML = matches.map(name => `
                    <div class="suggestion-item" onclick="selectAuthor('${name.replace(/'/g, "\\\\'")}')">
                        ${name}
                    </div>
                `).join('');
                suggestionBox.style.display = 'block';
            } else {
                suggestionBox.style.display = 'none';
            }
        }

        // ၃။ Suggestion ကို နှိပ်လိုက်တဲ့အခါ
        function selectAuthor(name) {
            document.getElementById('author-search').value = name;
            document.getElementById('author-suggestions').style.display = 'none';
            showBooksByAuthor(name);
        }

        // ၄။ Enter ခေါက်လိုက်တဲ့အခါ
        function handleAuthorKeyDown(event) {
            if (event.key === "Enter") {
                const val = event.target.value.trim();
                if (val !== "") {
                    document.getElementById('author-suggestions').style.display = 'none';
                    showBooksByAuthor(val);
                }
            }
        }

        // ၅။ ရွေးချယ်ထားတဲ့ Author ရဲ့ စာအုပ်တွေကို Container ထဲမှာ ပြပေးမယ်
        function showBooksByAuthor(authorName) {
            const displayContainer = document.getElementById('author-books-display');
            const resultTitle = document.getElementById('result-title');
            
            // Filter books
            const filtered = allBooksData.filter(b => 
                b.author && b.author.toLowerCase().includes(authorName.toLowerCase())
            );

            resultTitle.innerText = `"${authorName}" ၏ စာအုပ်များ (${filtered.length})`;

            if (filtered.length === 0) {
                displayContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center;">စာအုပ်ရှာမတွေ့ပါ။</p>`;
                return;
            }

            displayContainer.innerHTML = filtered.map(book => `
                <div class="book-card" onclick="location.href='detail.html?id=${book.id}'">
                    <img src="${book.cover}" onerror="this.src='https://via.placeholder.com/140x190'">
                    <div class="book-info">
                        <p class="book-title">${book.title}</p>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', initAuthorPage);

        // အပြင်ဘက်ကို နှိပ်ရင် suggestion box ပိတ်မယ်
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-area')) {
                document.getElementById('author-suggestions').style.display = 'none';
            }
        });
    </script>
</body>
</html>
