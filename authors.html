<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MmBookshelf - Authors</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .authors-container { padding: 80px 15px 20px; max-width: 1000px; margin: 0 auto; }
        .authors-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }
        .author-card {
            background: #fff;
            padding: 20px 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #eee;
        }
        .author-card:hover { transform: translateY(-5px); border-color: #2196F3; }
        .author-card i { font-size: 2rem; color: #2196F3; margin-bottom: 10px; }
        .author-name { font-weight: bold; font-size: 14px; color: #333; }
        
        .search-container { margin-bottom: 30px; position: relative; }
        .author-search-input {
            width: 100%;
            padding: 15px 45px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
        }
        .search-icon { position: absolute; left: 20px; top: 18px; color: #888; }
    </style>
</head>
<body>
    <div class="menu-overlay" id="menu-overlay"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="logo">
                <img src="photo_2026-03-20_09-18-40.jpg" alt="logo">
            </div>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> HOME</a></li>
                <li><a href="latest.html"><i class="fa-solid fa-book"></i> LATEST</a></li>
                <li><a href="authors.html" class="active"><i class="fa-solid fa-pen-nib"></i> AUTHORS</a></li>
                <li><a href="library.html"><i class="fa-solid fa-bookmark"></i> LIBRARY</a></li>
            </ul>
        </div>
    </nav>

    <div class="authors-container">
        <div class="section-header" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <i class="fa-solid fa-pen-nib" style="color: #2196F3; font-size: 1.5rem;"></i>
            <h2 style="margin: 0;">စာရေးဆရာများ</h2>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="author-search-input" id="author-search" placeholder="စာရေးဆရာအမည်ဖြင့် ရှာရန်..." oninput="searchAuthors()">
        </div>

        <div class="authors-grid" id="authors-list">
            <p style="text-align: center; grid-column: 1/-1;">စာရင်းများကို ရယူနေသည်...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>

    <script>
        let uniqueAuthors = [];

        async function fetchAuthors() {
            try {
                // mainscript.js ထဲက Supabase client ကို သုံးပါတယ်
                const { data: books, error } = await supabase
                    .from('books')
                    .select('author');

                if (error) throw error;

                // စာရေးဆရာအမည်များကို ထပ်မနေအောင် လုပ်ခြင်း
                const authorsRaw = books.map(b => b.author).filter(a => a);
                uniqueAuthors = [...new Set(authorsRaw)].sort();

                displayAuthors(uniqueAuthors);
            } catch (err) {
                console.error("Error fetching authors:", err);
                document.getElementById('authors-list').innerHTML = "<p>ဒေတာရယူ၍မရပါ။</p>";
            }
        }

        function displayAuthors(list) {
            const container = document.getElementById('authors-list');
            if (list.length === 0) {
                container.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>ရှာမတွေ့ပါ။</p>";
                return;
            }

            container.innerHTML = list.map(author => `
                <div class="author-card" onclick="goToAuthorBooks('${author}')">
                    <i class="fa-solid fa-circle-user"></i>
                    <div class="author-name">${author}</div>
                </div>
            `).join('');
        }

        function searchAuthors() {
            const keyword = document.getElementById('author-search').value.toLowerCase();
            const filtered = uniqueAuthors.filter(a => a.toLowerCase().includes(keyword));
            displayAuthors(filtered);
        }

        function goToAuthorBooks(authorName) {
            // index.html သို့ search parameter ဖြင့် လှမ်းပို့သည် (mainscript.js မှ handle လုပ်ပေးပါမည်)
            window.location.href = `index.html?search=${encodeURIComponent(authorName)}`;
        }

        document.addEventListener('DOMContentLoaded', fetchAuthors);
    </script>
</body>
</html>
