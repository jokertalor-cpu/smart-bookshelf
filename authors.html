<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bookshelf - Search Authors</title>
    <link rel="stylesheet" href="mainstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .authors-page-container { padding: 80px 15px 20px; max-width: 1000px; margin: 0 auto; }
        
        /* Search Section */
        .search-area { position: relative; margin-bottom: 30px; z-index: 100; }
        .author-input-wrapper { position: relative; display: flex; align-items: center; }
        .author-input-wrapper i { position: absolute; left: 15px; color: #888; }
        .author-search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .author-search-input:focus { border-color: #2196F3; box-shadow: 0 0 8px rgba(33, 150, 243, 0.2); }

        /* Suggestion Box */
        .author-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .suggestion-item:hover { background-color: #f0f7ff; color: #2196F3; }

        /* Results Grid */
        .author-results-section {
            margin-top: 20px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            min-height: 300px;
        }
        .author-books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .book-info { padding: 8px; text-align: center; }
        .book-title { font-size: 13px; font-weight: bold; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* Suggestion Box Scrollbar ကို ပိုလှအောင် လုပ်ခြင်း */
.author-suggestions::-webkit-scrollbar {
    width: 6px;
}
.author-suggestions::-webkit-scrollbar-track {
    background: #f1f1f1;
}
.author-suggestions::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}
.author-suggestions::-webkit-scrollbar-thumb:hover {
    background: #2196F3;
}
    </style>
</head>
<body>
    <div class="menu-overlay" id="menu-overlay"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </button>
            <div class="logo">
                <img src="photo_2026-03-20_09-18-40.jpg" alt="logo">
            </div>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> HOME</a></li>
                <li><a href="latest.html"><i class="fa-solid fa-book"></i> LATEST</a></li>
                <li><a href="authors.html" class="active"><i class="fa-solid fa-pen-nib"></i> AUTHORS</a></li>
                <li><a href="library.html"><i class="fa-solid fa-bookmark"></i> LIBRARY</a></li>
            </ul>
        </div>
    </nav>

    <div class="authors-page-container">
        <div class="section-header">
            <h2><i class="fa-solid fa-pen-nib"></i> စာရေးဆရာဖြင့် ရှာဖွေပါ</h2>
        </div>

        <div class="search-area">
            <div class="author-input-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="author-search" class="author-search-input" 
                       placeholder="စာရေးဆရာအမည် ရိုက်ထည့်ပါ..." 
                       oninput="handleAuthorInput()" 
                       onkeydown="handleAuthorKeyDown(event)" autocomplete="off">
            </div>
            <div id="author-suggestions" class="author-suggestions"></div>
        </div>

        <div class="author-results-section">
            <h3 id="result-title" style="color: #555;">ရှာဖွေမှု ရလဒ်များ</h3>
            <hr>
            <div id="author-books-display" class="author-books-grid">
                <p style="color: #999; grid-column: 1/-1; text-align: center; margin-top: 50px;">
                    စာရေးဆရာ အမည်ရိုက်နှိပ်ပြီး ရှာဖွေနိုင်ပါသည်။
                </p>
            </div>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>

    <script>
    // Variable အဟောင်းတွေနဲ့ initAuthorPage မလိုတော့ပါဘူး။
    // User က Input ရိုက်လိုက်တာနဲ့ ဒီ function က အလုပ်လုပ်ပါမယ်။

    async function handleAuthorInput() {
        const input = document.getElementById('author-search');
        const suggestionBox = document.getElementById('author-suggestions');
        const keyword = input.value.trim();

        // ၁။ စာရိုက်ထားတာမရှိရင် Suggestion ပိတ်ထားမယ်
        if (keyword === "") {
            suggestionBox.style.display = 'none';
            return;
        }

        try {
            // ၂။ Database ဆီမှာ ရိုက်လိုက်တဲ့စာလုံးနဲ့တူတဲ့ Author တွေကိုပဲ လှမ်းတောင်းမယ်
            // ilike သုံးထားလို့ အကြီးအသေး မှားရိုက်လည်း ရပါတယ်
            const { data, error } = await supabase
                .from('books')
                .select('author')
                .ilike('author', `%${keyword}%`)
                .limit(40); // အများဆုံး ၄၀ ထိ ရှာခိုင်းမယ်

            if (error) throw error;

            // ၃။ ရလာတဲ့ Data ထဲက နာမည်တူတာတွေကို ဖယ်ထုတ်မယ် (Unique ဖြစ်အောင်လုပ်တာပါ)
            const matches = [...new Set(data.map(item => item.author))].filter(a => a);

            // ၄။ Suggestion Box ထဲမှာ ထည့်ပြမယ်
            if (matches.length > 0) {
                suggestionBox.innerHTML = matches.map(name => `
                    <div class="suggestion-item" onclick="selectAuthor('${name.replace(/'/g, "\\\\'")}')">
                        <i class="fas fa-user-edit" style="font-size: 12px; margin-right: 10px; color: #aaa;"></i>
                        ${name}
                    </div>
                `).join('');
                suggestionBox.style.display = 'block';
            } else {
                suggestionBox.style.display = 'none';
            }
        } catch (err) {
            console.error("Search Error:", err.message);
        }
    }

    // Suggestion တစ်ခုကို နှိပ်လိုက်တဲ့အခါ
    function selectAuthor(name) {
        document.getElementById('author-search').value = name;
        document.getElementById('author-suggestions').style.display = 'none';
        showBooksByAuthor(name);
    }

    // Enter ခေါက်လိုက်တဲ့အခါ
    function handleAuthorKeyDown(event) {
        if (event.key === "Enter") {
            const val = event.target.value.trim();
            if (val !== "") {
                document.getElementById('author-suggestions').style.display = 'none';
                showBooksByAuthor(val);
            }
        }
    }

    // Database ကနေ Author ရဲ့ စာအုပ်တွေကို ဆွဲထုတ်ပြတဲ့အပိုင်း
    async function showBooksByAuthor(authorName) {
        const displayContainer = document.getElementById('author-books-display');
        const resultTitle = document.getElementById('result-title');
        
        displayContainer.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: #2196F3;"></i>
                <p style="margin-top: 10px;">စာအုပ်များ ရှာဖွေနေပါသည်...</p>
            </div>`;

        try {
            const { data: filtered, error } = await supabase
                .from('books')
                .select('id, title, cover')
                .ilike('author', `%${authorName}%`); 

            if (error) throw error;

            resultTitle.innerText = `"${authorName}" ၏ စာအုပ်များ (${filtered.length})`;

            if (filtered.length === 0) {
                displayContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 50px;">စာအုပ်ရှာမတွေ့ပါ။</p>`;
                return;
            }

            displayContainer.innerHTML = filtered.map(book => `
                <div class="book-card" onclick="location.href='detail.html?id=${book.id}'">
                    <img src="${book.cover}" loading="lazy" onerror="this.src='https://via.placeholder.com/140x190?text=No+Cover'">
                    <div class="book-info">
                        <p class="book-title">${book.title}</p>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            displayContainer.innerHTML = `<p style="color: red; grid-column: 1/-1; text-align: center;">အမှားအယွင်းရှိနေပါသည်။</p>`;
        }
    }

    // Suggestion box ပြင်ပကို နှိပ်ရင် ပိတ်ပေးမယ်
    document.addEventListener('click', (e) => {
        const searchArea = document.querySelector('.search-area');
        if (searchArea && !searchArea.contains(e.target)) {
            document.getElementById('author-suggestions').style.display = 'none';
        }
    });
</script>
</body>
</html>
