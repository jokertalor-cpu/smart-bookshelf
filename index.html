<script>
function toggleChat() {
    const window = document.getElementById('chat-window');
    window.style.display = window.style.display === 'none' ? 'flex' : 'none';
}
</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
<script src="mainscript.js"></script>
<script src="indexscript.js"></script>

 <script>
    // Groq API Configuration
    const GROQ_API_KEY = "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";

    window.toggleChat = function() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
    };

    window.sendToAI = async function() {
        const input = document.getElementById('ai-input');
        const chatContent = document.getElementById('chat-content');
        const msg = input.value.trim();

        if (!msg) return;

        // User Message
        chatContent.innerHTML += `<div style="background: #1a73e8; color: white; padding: 10px 15px; border-radius: 15px 15px 2px 15px; align-self: flex-end; max-width: 85%; font-size: 14px; margin-left: auto; margin-bottom: 10px;">${msg}</div>`;
        input.value = '';
        
        // Loading Indicator
        const loadingDiv = document.createElement('div');
        loadingDiv.style = "font-size: 12px; color: gray; margin-bottom: 10px; align-self: flex-start;";
        loadingDiv.textContent = "AI စဉ်းစားနေသည်...";
        chatContent.appendChild(loadingDiv);
        chatContent.scrollTop = chatContent.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "မင်းက Smart Bookshelf ရဲ့ AI အကူဖြစ်ပါတယ်။ စာအုပ်အကြောင်းတွေကို မြန်မာလို ယဉ်ကျေးစွာ ဖြေပေးပါ။" },
                        { role: "user", content: msg }
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            loadingDiv.remove();

            // AI Message
            chatContent.innerHTML += `<div style="background: #f1f3f4; color: #333; padding: 10px 15px; border-radius: 15px 15px 15px 2px; align-self: flex-start; max-width: 85%; font-size: 14px; margin-bottom: 10px;">${aiText}</div>`;
        } catch (error) {
            loadingDiv.remove();
            chatContent.innerHTML += `<div style="background: #ffebee; color: #c62828; padding: 10px 15px; border-radius: 10px; font-size: 13px; margin-bottom: 10px;">Error: API ချိတ်ဆက်မှု မအောင်မြင်ပါ။</div>`;
        } finally {
            chatContent.scrollTop = chatContent.scrollHeight;
        }
    };

    document.getElementById('ai-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendToAI();
    });
</script>
