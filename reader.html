<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MmBookshelf - Pro Reader</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        :root {
            --bg-color: #525659;
            --topbar-bg: #323639;
            --text-color: #ffffff;
            --accent-color: #2196F3;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --topbar-bg: #000000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Scroll ကို container ထဲမှာပဲထားမယ် */
            transition: background 0.3s;
        }

        /* --- Header / Navigation --- */
        .reader-header {
            height: 55px;
            background-color: var(--topbar-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .nav-group { display: flex; align-items: center; gap: 8px; }

        .btn-icon {
            padding: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text-color);
            border-radius: 50%;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.1); }
        .btn-icon.disabled { opacity: 0.2; pointer-events: none; }

        #book-title {
            font-size: 14px;
            font-weight: 600;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .page-info {
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            min-width: 50px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- Viewer Area --- */
        #viewer-container {
            margin-top: 55px;
            height: calc(100vh - 55px);
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }

        canvas {
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto !important;
            transform-origin: top center;
        }

        body.dark-mode canvas {
            filter: invert(0.9) hue-rotate(180deg);
        }

        /* --- UI Elements --- */
        #loading {
            position: fixed;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            text-align: center;
        }

        #awake-status {
            font-size: 10px;
            color: #2ecc71;
            display: none;
            margin-left: 5px;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 600px) {
            .nav-group { gap: 4px; }
            .btn-icon { padding: 8px; font-size: 1rem; }
            #book-title { max-width: 70px; font-size: 12px; }
            .page-info { font-size: 11px; padding: 3px 8px; }
        }
    </style>
</head>
<body>

    <header class="reader-header">
        <div class="nav-group">
            <i class="fa-solid fa-arrow-left btn-icon" onclick="history.back()"></i>
            <span id="book-title">Loading...</span>
            <span id="awake-status"><i class="fa-solid fa-sun"></i></span>
        </div>

        <div class="nav-group">
            <i class="fa-solid fa-chevron-left btn-icon" id="prev-page"></i>
            <span class="page-info"><span id="page-num">0</span> / <span id="page-count">0</span></span>
            <i class="fa-solid fa-chevron-right btn-icon" id="next-page"></i>
            
            <i class="fa-solid fa-magnifying-glass-plus btn-icon" id="zoom-in"></i>
            <i class="fa-solid fa-moon btn-icon" id="dark-mode-toggle"></i>
        </div>
    </header>

    <div id="loading">
        <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
        <p style="font-size: 12px; margin-top: 10px;">စာမျက်နှာကို ဖော်ထုတ်နေသည်...</p>
    </div>

    <div id="viewer-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        // PDF.js worker setup
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // URL & Database setup
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get('id');
        const mode = params.get('mode');
        const db = new Dexie("MmBookshelfDB");
        db.version(1).stores({ downloaded_books: 'id, title, author, cover, fileBlob, lastPage' });

        let pdfDoc = null, currentPage = 1, currentScale = 1.3, wakeLock = null;
        const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');
        const container = document.getElementById('viewer-container');

        // ၁။ Screen Stay Awake (Wake Lock)
        async function initWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('awake-status').style.display = 'inline-block';
                } catch (err) { console.warn("WakeLock error:", err); }
            }
        }

        // ၂။ Dark Mode Logic
        const darkBtn = document.getElementById('dark-mode-toggle');
        darkBtn.onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('reader-dark-mode', isDark);
            darkBtn.className = isDark ? "fa-solid fa-sun btn-icon" : "fa-solid fa-moon btn-icon";
        };
        if(localStorage.getItem('reader-dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
            darkBtn.className = "fa-solid fa-sun btn-icon";
        }

        // ၃။ Zoom Logic
        document.getElementById('zoom-in').onclick = () => {
            currentScale = currentScale >= 3.0 ? 1.0 : currentScale + 0.4;
            renderPage();
        };

        // ၄။ Navigation Logic
        document.getElementById('prev-page').onclick = () => { if(currentPage > 1) { currentPage--; renderPage(); container.scrollTop = 0; } };
        document.getElementById('next-page').onclick = () => { if(currentPage < pdfDoc.numPages) { currentPage++; renderPage(); container.scrollTop = 0; } };

        // ၅။ Main Load Function
        async function loadPDF() {
            try {
                let data;
                if (mode === 'offline') {
                    // ID format နှစ်မျိုးလုံးစစ်ပြီး စာအုပ်ရှာမယ်
                    const book = await db.downloaded_books.get(bookId) || await db.downloaded_books.get(Number(bookId));
                    if (!book) throw new Error("Offline file not found");
                    data = await book.fileBlob.arrayBuffer();
                    document.getElementById('book-title').innerText = book.title;
                    currentPage = book.lastPage ? parseInt(book.lastPage) : 1;
                } else {
                    data = decodeURIComponent(params.get('url'));
                    document.getElementById('book-title').innerText = "Online Read";
                    currentPage = 1;
                }

                pdfDoc = await pdfjsLib.getDocument(data).promise;
                document.getElementById('page-count').innerText = pdfDoc.numPages;
                
                await renderPage();
                initWakeLock();
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<p style='color:red;'>Error: ${err.message}</p>`;
            }
        }

        // ၆။ Rendering Function (Bookmark ပါဝင်သည်)
        async function renderPage() {
            if(!pdfDoc) return;
            document.getElementById('loading').style.display = 'block';

            try {
                const page = await pdfDoc.getPage(currentPage);
                const viewport = page.getViewport({ scale: currentScale });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                document.getElementById('page-num').innerText = currentPage;
                document.getElementById('loading').style.display = 'none';

                // Button States
                document.getElementById('prev-page').classList.toggle('disabled', currentPage <= 1);
                document.getElementById('next-page').classList.toggle('disabled', currentPage >= pdfDoc.numPages);

                // Bookmark Save (Offline Mode သာ)
                if (mode === 'offline' && bookId) {
                    await db.downloaded_books.update(bookId, { lastPage: currentPage });
                    await db.downloaded_books.update(Number(bookId), { lastPage: currentPage });
                }
            } catch (e) { console.error("Render Error:", e); }
        }

        window.onload = loadPDF;
    </script>
</body>
</html>
