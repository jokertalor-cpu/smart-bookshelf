<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartBookshelf</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; }
        body { font-family: 'Pyidaungsu', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg); margin: 0; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h3 { margin-bottom: 25px; color: #333; font-size: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .footer-link { margin-top: 20px; font-size: 13px; color: #666; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h3>Smart Bookshelf</h3>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">အကောင့်ဝင်ပါ သို့မဟုတ် အသစ်ဖွင့်ပါ</p>
        
        <input type="email" id="email" placeholder="Email (ဥပမာ- user@gmail.com)">
        <input type="password" id="password" placeholder="Password (အနည်းဆုံး ၆ လုံး)">
        
        <button id="auth-btn" onclick="handleAuth()">LOGIN / SIGN UP</button>
        
        <div class="footer-link">
            ပြန်သွားရန် - <a href="index.html">ပင်မစာမျက်နှာ</a>
        </div>
    </div>

    <script>
        // --- ၁။ Configuration (သင့်ရဲ့ Supabase URL နဲ့ Key ကို ဒီမှာ ထည့်ပါ) ---
        const SB_URL = "https://mituedqotwbmporkwbqf.supabase.co"; 
        const SB_KEY = "sb_publishable_gIcm03LyduvN6WgwZek4_Q_ePBBJBUc";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('auth-btn');

            if (!email || !password) {
                Swal.fire('သတိပေးချက်', 'Email နဲ့ Password ဖြည့်ပါ', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerText = "ခဏစောင့်ပါ...";

            try {
                // --- ၂။ Login အရင်ကြိုးစားကြည့်မည် ---
                const { data, error: loginError } = await sb.auth.signInWithPassword({ email, password });

                if (loginError) {
                    // Login မှားရင် အကောင့်မရှိတာလားဆိုပြီး Sign Up (အကောင့်သစ်ဖွင့်ခြင်း) ကြိုးစားမည်
                    if (loginError.message === "Invalid login credentials") {
                        const { error: signUpError } = await sb.auth.signUp({ email, password });
                        
                        if (signUpError) throw signUpError;

                        Swal.fire({
                            title: 'အကောင့်သစ်ဖွင့်ပြီးပါပြီ',
                            text: 'Email ထဲသို့ အတည်ပြုလွှာ ပို့ထားနိုင်ပါသည်။ Confirm လုပ်ပြီးမှ Login ပြန်ဝင်ပါ (သို့မဟုတ် Dashboard တွင် Confirm Email ပိတ်ထားပါ)။',
                            icon: 'success'
                        });
                    } else {
                        throw loginError;
                    }
                } else {
                    // --- ၃။ Login အောင်မြင်ပါက Library သို့ လွှတ်မည် ---
                    Swal.fire({
                        title: 'အောင်မြင်ပါသည်',
                        text: 'စာကြည့်တိုက်သို့ ခေါ်ဆောင်သွားနေသည်...',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'library.html';
                    });
                }
            } catch (err) {
                console.error("Auth Error:", err);
                Swal.fire('မှားယွင်းမှု', err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = "LOGIN / SIGN UP";
            }
        }

        // Login ဝင်ထားပြီးသားဆိုရင် Library ကို တန်းလွှတ်မယ်
        async function checkSession() {
            const { data } = await sb.auth.getSession();
            if (data.session) {
                window.location.href = 'library.html';
            }
        }
        checkSession();
    </script>
</body>
</html>
