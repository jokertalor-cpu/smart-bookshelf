<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - MmBookshelf</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <style>
        .library-container { padding: 80px 15px 20px; max-width: 1000px; margin: 0 auto; }
        .library-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
        }
        .book-card { 
            background: #fff; border-radius: 8px; overflow: hidden; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; padding: 10px;
        }
        .book-card img { width: 100%; border-radius: 5px; height: 180px; object-fit: cover; }
        .book-card p { margin: 8px 0; font-weight: bold; font-size: 13px; height: 32px; overflow: hidden; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-read { flex: 1; background: #2196F3; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .no-book { grid-column: 1/-1; text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <h2 style="color: white; margin: 0;">My Library</h2>
            <a href="index.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-house"></i> Home</a>
        </div>
    </nav>

    <div class="library-container">
        <div id="library-books-grid" class="library-grid">
            <p class="no-book">Loading Library...</p>
        </div>
    </div>

    <script>
        // ၁။ Database ကို detail.html က နာမည်အတိုင်း အတိအကျပေးပါ
        const db = new Dexie("MmBookshelfDB");
        db.version(1).stores({
            downloaded_books: 'id, title, author, cover, file_size, fileBlob'
        });

        // ၂။ စာအုပ်များ ထုတ်ပြခြင်း
        async function loadLibrary() {
            const grid = document.getElementById('library-books-grid');
            try {
                // Database ထဲက အကုန်ယူမယ်
                const books = await db.downloaded_books.toArray();

                if (books.length === 0) {
                    grid.innerHTML = `<div class="no-book">
                        <i class="fa-solid fa-folder-open" style="font-size: 40px; margin-bottom: 10px;"></i>
                        <p>ဒေါင်းလုဒ်ဆွဲထားသော စာအုပ်မရှိသေးပါ။</p>
                    </div>`;
                    return;
                }

                grid.innerHTML = books.map(book => `
                    <div class="book-card">
                        <img src="${book.cover}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/150'">
                        <p>${book.title}</p>
                        <div class="btn-group">
                            <button onclick="readBook('${book.id}')" class="btn-read">Read</button>
                            <button onclick="deleteBook('${book.id}')" class="btn-del"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Library Error:", err);
                grid.innerHTML = `<p style="color:red; text-align:center;">Error: Database ချိတ်ဆက်မှု မအောင်မြင်ပါ။</p>`;
            }
        }

        // ၃။ Offline ဖတ်ခြင်း
        async function readBook(id) {
            const book = await db.downloaded_books.get(id);
            if (book && book.fileBlob) {
                const blobUrl = URL.createObjectURL(book.fileBlob);
                window.open(blobUrl, '_blank');
            } else {
                alert("ဖိုင်ရှာမတွေ့ပါ။");
            }
        }

        // ၄။ ဖျက်ခြင်း
        async function deleteBook(id) {
            if(confirm("ဖျက်မှာ သေချာပါသလား?")) {
                await db.downloaded_books.delete(id);
                loadLibrary();
            }
        }

        window.onload = loadLibrary;
    </script>
</body>
</html>
