<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - SmartBookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>

    <style>
        :root { --primary: #313336; --danger: #ea4335; --heart: #e11d48; --bg: #f8f9fa; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        /* Navbar ပုံစံလေး အနည်းငယ်ထည့်ထားပါတယ် */
        .nav-header { background: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-container a { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 14px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section-title { font-size: 1.2rem; color: #202124; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .section-title.fav { border-left-color: var(--heart); }

        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
        }

        .book-card { 
            background: white; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .book-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer;
        }

        .book-card h3 { 
            font-size: 13px; 
            margin: 10px 0; 
            height: 38px; 
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #3c4043;
        }

        .actions { display: flex; flex-direction: column; gap: 5px; }
        
        .btn { 
            border: none; padding: 7px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-read { background: var(--primary); color: white; }
        .btn-info { background: #f1f3f4; color: #5f6368; }
        .btn-delete { background: #feeef3; color: var(--danger); }

        .empty-state { text-align: center; padding: 40px; color: #70757a; grid-column: 1/-1; background: #fff; border-radius: 12px; }
        
        @media (max-width: 480px) {
            .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .book-card img { height: 180px; }
        }
        .auth-notice {
    background: #fff3cd;
    border: 1px solid #ffeeba;
    color: #856404;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: none; /* Default အနေနဲ့ ဖျောက်ထားမယ် */
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}
.auth-notice .btn-login-sm {
    background: var(--primary);
    color: white;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 6px;
    font-size: 13px;
    white-space: nowrap;
}
#logout-btn {
    display: none; /* စဖွင့်ချင်း ဖျောက်ထားမယ် */
    background: #feeef3;
    color: #e11d48;
    border: 1px solid #fda4af;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}
    </style>
</head>
<body>

    <div class="nav-header">
       <div class="nav-container">
    <h2 style="margin:0; font-size: 1.2rem;"><i class="fas fa-book-bookmark"></i> MY LIBRARY</h2>
    <div style="display: flex; gap: 10px; align-items: center;">
        <button id="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> ထွက်မည်</button>
        <a href="index.html"><i class="fa-solid fa-house"></i> ပင်မစာမျက်နှာ</a>
    </div>
</div>
<div id="login-reminder" class="auth-notice">
    <div>
        <i class="fas fa-exclamation-triangle"></i>
        <span>သင် Login မဝင်ထားပါ။ စက်ပြောင်းခြင်း သို့မဟုတ် Browser Cache ရှင်းလိုက်ပါက ဒေတာများ ပျောက်ဆုံးနိုင်ပါသည်။</span>
    </div>
    <a href="auth.html" class="btn-login-sm">Login ဝင်မည်</a>
</div>
    <div class="container">
        <div class="section-title">
            <i class="fas fa-cloud-arrow-down"></i> အော့ဖ်လိုင်းစာအုပ်များ
        </div>
        <div id="library-grid" class="book-grid">
            <p>Loading offline books...</p>
        </div>

        <div class="section-title fav">
            <i class="fas fa-heart" style="color: var(--heart);"></i> သင်ကြိုက်နှစ်သက်သောစာအုပ်များ
        </div>
        <div id="fav-view" class="book-grid">
            <p>Loading favorites...</p>
        </div>
    </div>
<script>
   const SB_URL = "https://mituedqotwbmporkwbqf.supabase.co"; 
const SB_KEY = "sb_publishable_gIcm03LyduvN6WgwZek4_Q_ePBBJBUc";
const sb = supabase.createClient(SB_URL, SB_KEY);

const db = new Dexie("MyDigitalLibrary");
db.version(2).stores({ savedBooks: "id, title, author, cover, fileData, lastPage" });

// စာမျက်နှာစဖွင့်ချိန်တွင် အားလုံးကို စစ်ဆေးခြင်း
window.onload = () => {
    setupAuthListener(); 
    renderLibrary();    
    loadMyFavorites();  
};

// Login Status ကို အမြဲနားထောင်နေမည့် Function
function setupAuthListener() {
    const reminder = document.getElementById('login-reminder');
    const logoutBtn = document.getElementById('logout-btn');

    sb.auth.onAuthStateChange(async (event, session) => {
        if (session && session.user) {
            reminder.style.display = 'none';
            if(logoutBtn) logoutBtn.style.display = 'block';

            // Cloud နှင့် Sync လုပ်ခြင်း
            syncLikesToCloud(session.user.id);
            console.log("Syncing activity for:", session.user.email);
        } else {
            reminder.style.display = 'flex';
            if(logoutBtn) logoutBtn.style.display = 'none';
        }
    });
}

// Local Likes များကို Cloud ပေါ်သို့ တင်ပေးခြင်း
async function syncLikesToCloud(userId) {
    const localLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
    if (localLikes.length > 0) {
        const syncData = localLikes.map(id => ({ user_id: userId, book_id: parseInt(id) }));
        await sb.from('user_likes').upsert(syncData);
    }
}

// Logout လုပ်ဆောင်ချက်
async function handleLogout() {
    const { error } = await sb.auth.signOut();
    if (!error) {
        Swal.fire({ title: 'Logout လုပ်ပြီးပါပြီ', icon: 'info', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
    }
}

// Offline (Dexie) Library ကို ပြသခြင်း
async function renderLibrary() {
    const grid = document.getElementById('library-grid');
    try {
        const books = await db.savedBooks.toArray();
        if (books.length === 0) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-download fa-2x"></i><p>သိမ်းထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }
        grid.innerHTML = books.map(book => `
            <div class="book-card" id="card-${book.id}">
                <img src="${book.cover}" onclick="openReader('${book.id}')">
                <h3>${book.title}</h3>
                <div class="actions">
                    <button class="btn btn-read" onclick="openReader('${book.id}')"><i class="fas fa-book-open"></i> ဆက်ဖတ်မည်</button>
                    <button class="btn btn-delete" onclick="confirmDelete('${book.id}')"><i class="fas fa-trash"></i> ဖယ်ရှားမည်</button>
                </div>
            </div>
        `).join('');
    } catch (err) { console.error(err); }
}

// အသဲပေးထားသော စာရင်းကို Supabase မှ ဆွဲယူပြသခြင်း
async function loadMyFavorites() {
    const likedIds = JSON.parse(localStorage.getItem('my_likes') || '[]');
    const favContainer = document.getElementById('fav-view');

    if (likedIds.length === 0) {
        favContainer.innerHTML = `<div class="empty-state"><i class="far fa-heart fa-2x"></i><p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
        return;
    }

    try {
        const numericIds = likedIds.map(id => parseInt(id));
        const { data, error } = await sb.from('books').select('id, title, cover').in('id', numericIds);
        if (error) throw error;

        favContainer.innerHTML = data.map(item => `
            <div class="book-card" onclick="location.href='detail.html?id=${item.id}'" style="cursor:pointer;">
                <img src="${item.cover}">
                <h3>${item.title}</h3>
                <div class="actions">
                    <button class="btn btn-info"><i class="fas fa-info-circle"></i> အသေးစိတ်</button>
                </div>
            </div>
        `).join('');
    } catch (err) { console.error(err); }
}

function openReader(id) { window.location.href = `reader.html?id=${id}&mode=offline`; }

function confirmDelete(id) {
    Swal.fire({
        title: 'ဖျက်မှာ သေချာလား?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ea4335',
        confirmButtonText: 'ဖျက်မည်',
        cancelButtonText: 'မဖျက်တော့ပါ'
    }).then((result) => { if (result.isConfirmed) deleteBook(id); });
}

// Local ရော Cloud ပါ ဖျက်မည့် Function
async function deleteBook(id) {
    await db.savedBooks.delete(id);
    await db.savedBooks.delete(Number(id));

    const { data: { user } } = await sb.auth.getUser();
    if (user) {
        await Promise.all([
            sb.from('user_downloads').delete().eq('user_id', user.id).eq('book_id', id),
            sb.from('user_likes').delete().eq('user_id', user.id).eq('book_id', id)
        ]);
    }
    renderLibrary();
    Swal.fire({ title: 'ဖယ်ရှားပြီးပါပြီ', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
}</script>
</body>
</html>
