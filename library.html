<body>

    <div class="container" style="padding-top: 80px;">
        <h2><i class="fa-solid fa-bookmark" style="color: #f1c40f;"></i> My Personal Library</h2>
        <hr>
        <div id="library-container" class="scroll-wrapper" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 20px;">
            <p>Library ထဲမှာ စာအုပ်များ မရှိသေးပါ။</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>

    <script>
        // ၁။ Database ကိုအရင် ချိတ်ဆက်မယ် (mainscript.js ထဲကအတိုင်း နာမည်တူရပါမယ်)
const db = new Dexie("MmBookshelfDB");
db.version(1).stores({
    downloaded_books: 'id, title, author, cover, fileBlob, file_size'
});

// ၂။ Library ထဲကစာအုပ်များကို ဆွဲထုတ်ပြမည့် Function
async function renderLibrary() {
    const container = document.getElementById('library-container');
    
    try {
        // IndexedDB ထဲမှာ တကယ်ရှိနေတဲ့ စာအုပ်တွေကို ယူမယ်
        const offlineBooks = await db.downloaded_books.toArray();

        if (offlineBooks.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding: 50px; color: #888;">
                    <i class="fa-solid fa-book-open" style="font-size: 50px; margin-bottom: 10px;"></i>
                    <p>ဒေါင်းလုဒ်လုပ်ထားသော စာအုပ်မရှိသေးပါ။</p>
                    <a href="index.html" style="color: #2196F3; text-decoration: none;">စာအုပ်များသွားရှာရန်</a>
                </div>`;
            return;
        }

        // စာအုပ်ကတ်ပြားများကို Render လုပ်မယ်
        container.innerHTML = offlineBooks.map(book => `
            <div class="book-card" style="position: relative;">
                <img src="${book.cover}" alt="${book.title}" style="cursor: pointer;" onclick="readOfflineBook(${book.id})">
                <p class="title">${book.title}</p>
                <p style="font-size: 11px; color: #888; margin: 5px 0;">Size: ${book.file_size || 'N/A'}</p>
                
                <div style="display: flex; gap: 5px;">
                    <button onclick="readOfflineBook(${book.id})" class="btn-read-small" 
                            style="flex: 1; padding: 8px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        <i class="fa-solid fa-book-open"></i> Read
                    </button>
                    <button onclick="deleteOfflineBook(${book.id})" 
                            style="padding: 8px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
        
    } catch (error) {
        console.error("Error loading library:", error);
    }
}

// ၃။ Offline ဖတ်ရန် (Blob URL ဖန်တီးပြီး ဖွင့်ခြင်း)
async function readOfflineBook(id) {
    const book = await db.downloaded_books.get(id);
    if (book && book.fileBlob) {
        const fileURL = URL.createObjectURL(book.fileBlob);
        // Browser Reader ဖြင့် အသစ်ဖွင့်ပေးမည်
        window.open(fileURL, '_blank');
    } else {
        alert("ဖိုင်ရှာမတွေ့ပါ။ တစ်ကြိမ်ပြန်လည် ဒေါင်းလုဒ်ဆွဲပေးပါ။");
    }
}

// ၄။ Offline စာရင်းမှ ဖျက်ထုတ်ရန်
async function deleteOfflineBook(id) {
    if(confirm("ဤစာအုပ်ကို ဒေါင်းလုဒ်စာရင်းမှ ဖျက်ရန် သေချာပါသလား?")) {
        await db.downloaded_books.delete(id);
        renderLibrary(); // စာရင်းကိုချက်ချင်း Update လုပ်မယ်
    }
}

// ၅။ စာမျက်နှာဖွင့်လိုက်တာနဲ့ စတင်ခေါ်ယူရန်
document.addEventListener('DOMContentLoaded', renderLibrary);
    </script>
</body>
