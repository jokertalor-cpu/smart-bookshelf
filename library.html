<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - SmartBookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>

    <style>
        :root { --primary: #313336; --danger: #ea4335; --heart: #e11d48; --bg: #f8f9fa; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        .nav-header { background: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-container a { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 14px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section-title { font-size: 1.1rem; color: #202124; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .section-title.fav { border-left-color: var(--heart); }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .book-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: 0.3s; display: flex; flex-direction: column; }
        .book-card img { width: 100%; height: 190px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .book-card h3 { font-size: 13px; margin: 10px 0; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #3c4043; }

        .actions { display: flex; flex-direction: column; gap: 5px; margin-top: auto; }
        .btn { border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-read { background: var(--primary); color: white; }
        .btn-delete { background: #feeef3; color: var(--danger); }
        .btn-info { background: #f1f3f4; color: #5f6368; }

        .empty-state { text-align: center; padding: 40px; color: #70757a; grid-column: 1/-1; background: #fff; border-radius: 12px; }
        .auth-notice { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; align-items: center; justify-content: space-between; font-size: 13px; }
        
        #logout-btn { display: none; background: #f1f3f4; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #5f6368; }

        @media (max-width: 480px) {
            .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .book-card img { height: 170px; }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="nav-container">
            <h2 style="margin:0; font-size: 1.1rem;"><i class="fas fa-bookmark"></i> စာကြည့်တိုက်</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> ထွက်မည်</button>
                <a href="index.html"><i class="fa-solid fa-house"></i> ပင်မစာမျက်နှာ</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="login-reminder" class="auth-notice">
            <span><i class="fas fa-info-circle"></i> Login ဝင်ထားပါက စက်ပြောင်းသော်လည်း စာရင်းများ ပြန်ရနိုင်ပါသည်။</span>
            <a href="auth.html" style="color: #856404; font-weight: bold; text-decoration: none;">Login ဝင်မည်</a>
        </div>

        <div class="section-title">
            <i class="fas fa-download"></i> အော့ဖ်လိုင်းဖတ်ရန် သိမ်းထားသည်များ
        </div>
        <div id="library-grid" class="book-grid">
            <p style="grid-column: 1/-1; text-align: center;">Loading...</p>
        </div>

        <div class="section-title fav">
            <i class="fas fa-heart" style="color: var(--heart);"></i> သင်ကြိုက်နှစ်သက်သောစာအုပ်များ
        </div>
        <div id="fav-view" class="book-grid">
            <p style="grid-column: 1/-1; text-align: center;">Loading...</p>
        </div>
    </div>

<script>
    // --- Configuration ---
    const SB_URL = "https://cmguamftohgcgwdggwde.supabase.co"; 
    const SB_KEY = "sb_publishable_xiWtoACTDkbfjmz9RMxWdw_R5W1UtZ9";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const db = new Dexie("MyDigitalLibrary");
    db.version(2).stores({ savedBooks: "id, title, author, cover, fileData, lastPage" });

    window.onload = () => {
        setupAuthListener();
        renderLibrary(); // Offline books
        loadMyFavorites(); // Liked books
    };

    // --- Authentication & Sync Logic ---
    function setupAuthListener() {
        const reminder = document.getElementById('login-reminder');
        const logoutBtn = document.getElementById('logout-btn');

        sb.auth.onAuthStateChange((event, session) => {
            if (session) {
                reminder.style.display = 'none';
                logoutBtn.style.display = 'block';
                syncLikesToCloud(session.user.id);
            } else {
                reminder.style.display = 'flex';
                logoutBtn.style.display = 'none';
            }
        });
    }

    async function syncLikesToCloud(userId) {
        const localLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
        if (localLikes.length === 0) return;

        try {
            const syncData = localLikes.map(id => ({ user_id: userId, book_id: parseInt(id) }));
            await sb.from('user_likes').upsert(syncData, { onConflict: 'user_id, book_id' });
        } catch (err) { console.error("Sync error:", err); }
    }

    async function handleLogout() {
        await sb.auth.signOut();
        location.reload();
    }

    // --- (၁) အော့ဖ်လိုင်းစာအုပ်များ ပြသခြင်း (Local Data) ---
    async function renderLibrary() {
        const grid = document.getElementById('library-grid');
        try {
            const books = await db.savedBooks.toArray();
            if (books.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open fa-2x"></i><p>သိမ်းထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
                return;
            }

            const fragment = document.createDocumentFragment();
            grid.innerHTML = '';

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <img src="${book.cover}" loading="lazy" onclick="openReader('${book.id}')">
                    <h3>${book.title}</h3>
                    <div class="actions">
                        <button class="btn btn-read" onclick="openReader('${book.id}')"><i class="fas fa-book-open"></i> ဆက်ဖတ်မည်</button>
                        <button class="btn btn-delete" onclick="confirmDelete('${book.id}', 'download')"><i class="fas fa-trash"></i> ဖယ်ရှားမည်</button>
                    </div>
                `;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
        } catch (err) { console.error(err); }
    }

    // --- (၂) အသဲပေးစာရင်း ပြသခြင်း (Cloud/Local Sync) ---
    async function loadMyFavorites() {
        const favContainer = document.getElementById('fav-view');
        let likedIds = JSON.parse(localStorage.getItem('my_likes') || '[]');

        if (likedIds.length === 0) {
            favContainer.innerHTML = `<div class="empty-state"><i class="far fa-heart fa-2x"></i><p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }

        try {
            const numericIds = likedIds.map(id => parseInt(id));
            const { data, error } = await sb.from('books').select('id, title, cover').in('id', numericIds);

            if (error) throw error;

            favContainer.innerHTML = data.map(item => `
                <div class="book-card">
                    <img src="${item.cover}" loading="lazy" onclick="location.href='detail.html?id=${item.id}'">
                    <h3>${item.title}</h3>
                    <div class="actions">
                        <button class="btn btn-info" onclick="location.href='detail.html?id=${item.id}'"><i class="fas fa-info-circle"></i> အသေးစိတ်</button>
                        <button class="btn btn-delete" onclick="confirmDelete('${item.id}', 'like')"><i class="fas fa-heart-crack"></i> Unlike</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
            favContainer.innerHTML = `<p style="text-align:center; color:#888;">Offline ဖြစ်နေ၍ မပြနိုင်ပါ။</p>`;
        }
    }

    // --- (၃) စီမံခန့်ခွဲမှုဆိုင်ရာ Function များ ---
    function openReader(id) { window.location.href = `reader.html?id=${id}&mode=offline`; }

    function confirmDelete(id, type) {
        const msg = type === 'download' ? "အော့ဖ်လိုင်းစာရင်းမှ ဖျက်မှာလား?" : "အသဲပေးစာရင်းမှ ဖယ်မှာလား?";
        Swal.fire({
            title: msg,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ea4335',
            confirmButtonText: 'သေချာသည်',
            cancelButtonText: 'မလုပ်တော့ပါ'
        }).then((result) => {
            if (result.isConfirmed) {
                if (type === 'download') deleteDownload(id);
                else removeLike(id);
            }
        });
    }

    async function deleteDownload(id) {
        await db.savedBooks.delete(id);
        await db.savedBooks.delete(Number(id));
        renderLibrary();
        showToast("အော့ဖ်လိုင်းမှ ဖယ်ရှားပြီးပါပြီ");
    }

    async function removeLike(id) {
        // Local ဖျက်မယ်
        let likes = JSON.parse(localStorage.getItem('my_likes') || '[]');
        likes = likes.filter(item => item != id);
        localStorage.setItem('my_likes', JSON.stringify(likes));

        // Cloud ဖျက်မယ် (Login ဝင်ထားရင်)
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            await sb.from('user_likes').delete().eq('user_id', user.id).eq('book_id', id);
        }
        loadMyFavorites();
        showToast("အသဲပေးစာရင်းမှ ဖယ်ရှားပြီးပါပြီ");
    }

    function showToast(msg) {
        Swal.fire({ title: msg, icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
    }
</script>
</body>
</html>
