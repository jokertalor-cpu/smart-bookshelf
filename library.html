<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - SmartBookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>

    <style>
        :root { 
            --primary: #313336; 
            --danger: #ea4335; 
            --heart: #e11d48; 
            --bg: #f8f9fa;
            --success: #34a853;
            --warning: #fbbc04;
            --ai-primary: #8e44ad;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Pyidaungsu', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 50px;
            overflow-x: hidden;
        }
        
        /* Navigation (Match aiassistant.html) */
        nav { 
            background: white; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .logo { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--primary); 
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-links { 
            display: flex; 
            gap: 20px; 
        }
        
        .nav-links a { 
            text-decoration: none; 
            color: #5f6368; 
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        
        .nav-links a:hover { 
            color: var(--ai-primary); 
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 15px; 
        }
        
        .section-title { 
            font-size: 1.2rem; 
            color: #202124; 
            margin: 30px 0 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-left: 4px solid var(--primary); 
            padding-left: 12px;
            font-weight: 600;
        }
        
        .section-title.fav { 
            border-left-color: var(--heart); 
        }

        /* Skeleton Loading Animation */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        .skeleton-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .skeleton-image {
            width: 100%;
            height: 190px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .skeleton-title {
            height: 16px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .skeleton-text {
            height: 12px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* Book Grid */
        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            min-height: 100px; 
        }
        
        .book-card { 
            background: white; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            flex-direction: column; 
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .book-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transform: translateY(-4px);
        }
        
        .book-card-image-wrapper {
            position: relative;
            width: 100%;
            height: 190px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .book-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .book-card:hover img {
            transform: scale(1.05);
        }

        .book-card h3 { 
            font-size: 13px; 
            margin: 8px 0; 
            height: 36px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            color: #3c4043;
            font-weight: 500;
        }

        /* Status Badges */
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .status-badge.offline {
            background: rgba(52, 168, 83, 0.9);
            color: white;
        }

        .status-badge.downloading {
            background: rgba(251, 188, 4, 0.9);
            color: white;
        }

        .status-badge.queued {
            background: rgba(26, 115, 232, 0.9);
            color: white;
        }

        /* Download Progress Bar */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(0,0,0,0.1);
            display: none;
            z-index: 5;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #1a73e8, #4285f4);
            width: 0%;
            transition: width 0.3s ease;
        }

        .actions { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            margin-top: auto; 
        }
        
        .btn { 
            border: none; 
            padding: 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 11px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-read { 
            background: var(--primary); 
            color: white;
        }

        .btn-read:hover:not(:disabled) {
            background: #1f2023;
            box-shadow: 0 4px 12px rgba(49, 51, 54, 0.2);
        }
        
        .btn-download { 
            background: #e8f0fe; 
            color: #1a73e8;
            font-weight: 600;
        }

        .btn-download:hover:not(:disabled) {
            background: #d2e3fc;
        }

        .btn-delete { 
            background: #feeef3; 
            color: var(--danger);
        }

        .btn-delete:hover:not(:disabled) {
            background: #fdd7e4;
        }

        .empty-state { 
            text-align: center; 
            padding: 60px 40px; 
            color: #70757a; 
            grid-column: 1/-1; 
            background: white; 
            border-radius: 12px;
            border: 2px dashed #dadce0;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #dadce0;
        }

        .empty-state p {
            font-size: 16px;
            margin: 8px 0;
        }

        .auth-notice { 
            background: linear-gradient(135deg, #fff3cd, #fffbea);
            border: 1px solid #ffeeba; 
            color: #856404; 
            padding: 14px 16px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            display: none; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Sync Status */
        .sync-status {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 14px 18px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            font-size: 12px;
            z-index: 999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .sync-status.active {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pull-to-refresh {
            height: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: height 0.3s;
            background: #f1f3f4;
        }

        .pull-to-refresh.active {
            height: 60px;
        }

        /* Responsive adjustments (Match aiassistant.html) */
        @media (max-width: 768px) {
            nav { padding: 15px 5%; }
            .nav-links a {
                font-size: 0;
                padding: 5px;
            }
            .nav-links a i {
                font-size: 20px;
                margin: 0;
            }
            .logo { font-size: 0; }
            .logo i { font-size: 24px; }
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
            .section-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="pull-to-refresh" id="pullToRefresh">
        <div class="spinner"></div>
    </div>

    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-book"></i> SMART BOOKSHELF
        </a>
        <div class="nav-links">
            <a href="ai-assistant.html" style="color: #8e44ad;"><i class="fas fa-robot"></i> AI Assistant</a>
            <a href="index.html"><i class="fas fa-home"></i> ပင်မစာမျက်နှာ</a>
            <a href="library.html"><i class="fas fa-book"></i> စာကြည့်တိုက်</a>
            <a href="account.html"><i class="fas fa-user"></i> အကောင့်</a>
        </div>
    </nav>

    <div class="container">
        <div id="login-reminder" class="auth-notice">
            <span><i class="fas fa-info-circle"></i> Login ဝင်ထားပါက စက်ပြောင်းသော်လည်း စာရင်းများ ပြန်ရနိုင်ပါသည်။</span>
            <a href="auth.html" style="color: #856404; font-weight: bold; text-decoration: none;">Login ဝင်မည်</a>
        </div>

        <div class="section-title">
            <i class="fas fa-cloud"></i> ကျွန်ုပ်၏ စာအုပ်များ
        </div>
        <div id="library-grid" class="book-grid">
            <!-- Skeleton Loaders -->
        </div>

        <div class="section-title fav">
            <i class="fas fa-heart" style="color: var(--heart);"></i> သင်ကြိုက်နှစ်သက်သောစာအုပ်များ
        </div>
        <div id="fav-view" class="book-grid">
            <!-- Favorites -->
        </div>
    </div>

    <div class="sync-status" id="syncStatus">
        <div class="spinner"></div>
        <span id="syncText">ဒေတာများ ညှိနှိုင်းနေသည်...</span>
    </div>

<script>
    const SB_URL = "https://mituedqotwbmporkwbqf.supabase.co"; 
    const SB_KEY = "sb_publishable_gIcm03LyduvN6WgwZek4_Q_ePBBJBUc";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const db = new Dexie("MyDigitalLibrary");
    db.version(3).stores({ 
        savedBooks: "id, title, author, cover, fileData, lastPage, lastReadDate, readingProgress",
        downloadQueue: "id, bookId, status, retryCount, createdAt"
    });

    let currentUser = null;
    let isOffline = !navigator.onLine;
    let downloadQueue = new Map();
    let touchStartY = 0;

    // Network Status Listeners
    window.addEventListener('online', () => { isOffline = false; syncAll(); });
    window.addEventListener('offline', () => { isOffline = true; renderLibrary(); });

    // Pull to Refresh
    document.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', (e) => {
        if (window.scrollY === 0) {
            const touchY = e.touches[0].clientY;
            const diff = touchY - touchStartY;
            if (diff > 50) {
                document.getElementById('pullToRefresh').classList.add('active');
            }
        }
    });

    document.addEventListener('touchend', async (e) => {
        if (document.getElementById('pullToRefresh').classList.contains('active')) {
            document.getElementById('pullToRefresh').classList.remove('active');
            await syncAll();
        }
    });

    window.onload = async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            currentUser = session.user;
            document.getElementById('login-reminder').style.display = 'none';
            showSkeletonLoaders();
            await syncAll();
        } else {
            document.getElementById('login-reminder').style.display = 'flex';
            await renderLibrary();
            await renderFavorites();
        }
        setupAuthListener();
        loadDownloadQueue();
    };

    function setupAuthListener() {
        // Auth Listener ကို တစ်ကြိမ်ပဲ initialize လုပ်ဖို့နဲ့ event trigger ဖြစ်တိုင်း reload မဖြစ်အောင် ထိန်းညှိထားပါတယ်
        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN') {
                if (session && (!currentUser || currentUser.id !== session.user.id)) {
                    currentUser = session.user;
                    document.getElementById('login-reminder').style.display = 'none';
                    showSkeletonLoaders();
                    await syncAll();
                }
            } else if (event === 'SIGNED_OUT') {
                if (currentUser) {
                    currentUser = null;
                    document.getElementById('login-reminder').style.display = 'flex';
                    localStorage.removeItem('my_likes');
                    await db.savedBooks.clear();
                    location.reload();
                }
            }
        });
    }

    function showSkeletonLoaders() {
        const grid = document.getElementById('library-grid');
        grid.innerHTML = Array(8).fill(0).map(() => `
            <div class="skeleton-card">
                <div class="skeleton skeleton-image"></div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width: 80%;"></div>
            </div>
        `).join('');
    }

    async function syncAll() {
        if (!currentUser || isOffline) {
            await renderLibrary();
            await renderFavorites();
            return;
        }

        showSyncStatus(true, "စာရင်းများ ညှိနှိုင်းနေသည်...");
        try {
            // Sync Favorites
            const { data: likesData } = await sb.from('user_likes').select('book_id').eq('user_id', currentUser.id);
            if (likesData) {
                localStorage.setItem('my_likes', JSON.stringify(likesData.map(i => i.book_id.toString())));
            }

            // Sync Downloads Metadata (Cloud-First)
            const { data: downloadsData } = await sb
                .from('user_downloads')
                .select('book_id, books:book_id(id, title, author, cover, download_link)')
                .eq('user_id', currentUser.id);

            if (downloadsData) {
                const cloudBooks = downloadsData.filter(d => d.books).map(d => d.books);
                
                // Update metadata in Dexie
                for (const book of cloudBooks) {
                    const existing = await db.savedBooks.get(book.id.toString());
                    if (!existing) {
                        await db.savedBooks.put({
                            id: book.id.toString(),
                            title: book.title,
                            author: book.author,
                            cover: book.cover,
                            fileData: null,
                            readingProgress: 0,
                            lastReadDate: null
                        });
                    }
                }

                // Remove local books not in cloud
                const cloudIds = new Set(cloudBooks.map(b => b.id.toString()));
                const localBooks = await db.savedBooks.toArray();
                for (const lb of localBooks) {
                    if (!cloudIds.has(lb.id.toString())) {
                        await db.savedBooks.delete(lb.id);
                    }
                }
            }

            // Process download queue
            await processDownloadQueue();
        } catch (err) {
            console.error("Sync Error:", err);
        } finally {
            await renderLibrary();
            await renderFavorites();
            showSyncStatus(false);
        }
    }

    async function downloadAndSave(bookId, retryCount = 0) {
        const MAX_RETRIES = 3;
        const book = await db.savedBooks.get(bookId);
        if (!book) return;

        try {
            const { data, error } = await sb.from('books').select('download_link').eq('id', bookId).single();
            if (error || !data.download_link) throw new Error("Download link not found");

            const cardElement = document.querySelector(`[data-book-id="${bookId}"]`);
            const progressBar = cardElement?.querySelector('.progress-bar');
            const progressContainer = cardElement?.querySelector('.progress-container');

            if (progressContainer) progressContainer.classList.add('active');

            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable && progressBar) {
                    const percentComplete = (e.loaded / e.total) * 100;
                    progressBar.style.width = percentComplete + '%';
                }
            });

            xhr.addEventListener('load', async () => {
                if (xhr.status === 200) {
                    const blob = new Blob([xhr.response], { type: 'application/pdf' });
                    await db.savedBooks.update(bookId, { 
                        fileData: blob,
                        lastReadDate: new Date().toISOString()
                    });
                    
                    await db.downloadQueue.delete(bookId);
                    downloadQueue.delete(bookId);
                    
                    showSyncStatus(true, `"${book.title}" ကို ဒေါင်းလုဒ်လုပ်ပြီးပါပြီ။`);
                    setTimeout(() => showSyncStatus(false), 2000);
                    
                    await renderLibrary();
                } else {
                    throw new Error('Download failed');
                }
            });

            xhr.addEventListener('error', async () => {
                if (retryCount < MAX_RETRIES) {
                    await db.downloadQueue.update(bookId, { 
                        retryCount: retryCount + 1,
                        status: 'retrying'
                    });
                    setTimeout(() => downloadAndSave(bookId, retryCount + 1), 2000 * (retryCount + 1));
                } else {
                    await db.downloadQueue.update(bookId, { status: 'failed' });
                    Swal.fire('အမှားအယွင်း', `"${book.title}" ဒေါင်းလုဒ်လုပ်၍မရပါ။ နောက်မှ ထပ်မံကြိုးစားပါ။`, 'error');
                }
            });

            xhr.open('GET', data.download_link);
            xhr.responseType = 'arraybuffer';
            xhr.send();

            await db.downloadQueue.put({
                id: bookId,
                bookId: bookId,
                status: 'downloading',
                retryCount: retryCount
            });
            downloadQueue.set(bookId, 'downloading');

        } catch (e) {
            console.error("Download Error:", e);
            Swal.fire('အမှားအယွင်း', 'ဒေါင်းလုဒ်လုပ်၍မရပါ။', 'error');
        }
    }

    async function processDownloadQueue() {
        const queue = await db.downloadQueue.where('status').anyOf('queued', 'retrying').toArray();
        for (const item of queue) {
            await downloadAndSave(item.bookId, item.retryCount);
        }
    }

    async function loadDownloadQueue() {
        const queue = await db.downloadQueue.toArray();
        queue.forEach(item => {
            downloadQueue.set(item.bookId, item.status);
        });
    }

    async function renderLibrary() {
        const grid = document.getElementById('library-grid');
        let books = await db.savedBooks.toArray();

        if (isOffline) {
            books = books.filter(b => b.fileData !== null);
        }

        if (books.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-cloud-download-alt"></i>
                    <p>${isOffline ? 'အော့ဖ်လိုင်းဖတ်ရန် သိမ်းထားသောစာအုပ် မရှိပါ။' : 'စာအုပ်စာရင်း မရှိသေးပါ။'}</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = books.map(book => {
            const isDownloaded = book.fileData !== null;
            const queueStatus = downloadQueue.get(book.id);
            const isDownloading = queueStatus === 'downloading' || queueStatus === 'retrying';

            return `
                <div class="book-card" data-book-id="${book.id}">
                    ${isDownloaded ? '<div class="status-badge offline"><i class="fas fa-check-circle"></i> Offline</div>' : ''}
                    ${isDownloading ? '<div class="status-badge downloading"><i class="fas fa-spinner fa-spin"></i> Downloading</div>' : ''}
                    
                    <div class="book-card-image-wrapper">
                        <img src="${book.cover}" loading="lazy" onclick="${isDownloaded ? `openReader('${book.id}')` : `downloadAndSave('${book.id}')`}" alt="${book.title}">
                        <div class="progress-container">
                            <div class="progress-bar"></div>
                        </div>
                    </div>
                    
                    <h3>${book.title}</h3>
                    
                    <div class="actions">
                        ${isDownloaded 
                            ? `<button class="btn btn-read" onclick="openReader('${book.id}')"><i class="fas fa-book-open"></i> Read</button>`
                            : `<button class="btn btn-download" onclick="downloadAndSave('${book.id}')" ${isDownloading ? 'disabled' : ''}><i class="fas fa-download"></i> Download</button>`
                        }
                        <button class="btn btn-delete" onclick="confirmDelete('${book.id}')"><i class="fas fa-trash"></i> Remove</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function renderFavorites() {
        const favContainer = document.getElementById('fav-view');
        let likedIds = JSON.parse(localStorage.getItem('my_likes') || '[]');

        if (likedIds.length === 0) {
            favContainer.innerHTML = `
                <div class="empty-state">
                    <i class="far fa-heart"></i>
                    <p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p>
                </div>
            `;
            return;
        }

        try {
            const { data: favBooks } = await sb.from('books').select('*').in('id', likedIds);
            
            favContainer.innerHTML = favBooks.map(book => `
                <div class="book-card">
                    <div class="book-card-image-wrapper">
                        <img src="${book.cover}" onclick="window.location.href='book-details.html?id=${book.id}'" alt="${book.title}">
                    </div>
                    <h3>${book.title}</h3>
                    <div class="actions">
                        <button class="btn btn-read" onclick="window.location.href='book-details.html?id=${book.id}'"><i class="fas fa-info-circle"></i> Details</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error(e);
        }
    }

    async function openReader(id) {
        const book = await db.savedBooks.get(id);
        if (book) {
            await db.savedBooks.update(id, { 
                lastReadDate: new Date().toISOString()
            });
            
            if (currentUser) {
                await sb.from('user_reading_progress').upsert({
                    user_id: currentUser.id,
                    book_id: id,
                    last_read_date: new Date().toISOString(),
                    reading_progress: book.readingProgress || 0
                }, { onConflict: 'user_id,book_id' });
            }
        }
        
        window.location.href = `reader.html?id=${id}`;
    }

    async function confirmDelete(id) {
        const book = await db.savedBooks.get(id);
        const result = await Swal.fire({
            title: 'ဖယ်ရှားမည်လား?',
            text: isOffline ? "အော့ဖ်လိုင်းဖိုင်ကို ဖယ်ရှားလိုက်မည်။" : "စက်ထဲမှ ဖယ်ရှားလိုက်သော်လည်း Cloud တွင် စာရင်းရှိနေပါမည်။",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ea4335',
            confirmButtonText: 'ဖယ်ရှားမည်',
            cancelButtonText: 'မလုပ်တော့ပါ'
        });

        if (result.isConfirmed) {
            await db.savedBooks.update(id, { fileData: null });
            await renderLibrary();
            Swal.fire('ဖယ်ရှားပြီးပါပြီ', '', 'success');
        }
    }

    function showSyncStatus(show, text = "") {
        const el = document.getElementById('syncStatus');
        if (text) document.getElementById('syncText').textContent = text;
        if (show) {
            el.classList.add('active');
        } else {
            el.classList.remove('active');
        }
    }

</script>
</body>
</html>
