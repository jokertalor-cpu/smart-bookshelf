<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - SmartBookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    
    <style>
        :root {
            --primary: #313336;
            --danger: #ea4335;
            --heart: #e11d48;
            --bg: #f8f9fa;
            --shadow-sm: 0 2px 5px rgba(0,0,0,0.05);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Pyidaungsu', 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            color: #202124;
        }
        
        .nav-header {
            background: white;
            padding: 15px 20px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e8eaed;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .nav-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .nav-left a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-left a:hover {
            color: #5f6368;
        }
        
        .nav-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #202124;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .library-section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .book-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }
        
        .book-info {
            padding: 12px;
        }
        
        .book-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .book-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .book-actions button {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .btn-read {
            background: var(--primary);
            color: white;
        }
        
        .btn-read:hover {
            background: #202124;
        }
        
        .btn-delete {
            background: var(--danger);
            color: white;
        }
        
        .btn-delete:hover {
            background: #d33427;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9aa0a6;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #9aa0a6;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }
            
            .nav-container {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="nav-header">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html">ပင်မစာမျက်နှာ</a>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" id="auth-btn">Login ဝင်မည်</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div id="alert-container"></div>
        
        <div class="library-section">
            <div class="section-title">
                <i class="fas fa-download"></i>
                ဆွဲယူထားသောစာအုပ်များ
            </div>
            <div id="downloaded-books" class="books-grid"></div>
        </div>
        
        <div class="library-section">
            <div class="section-title">
                <i class="fas fa-heart"></i>
                သင်နှစ်သက်သောစာအုပ်များ
            </div>
            <div id="favorites-books" class="books-grid"></div>
        </div>
    </div>
    
    <script>
        // Initialize Dexie
        const db = new Dexie('SmartBookshelfDB');
        db.version(1).stores({
            books: 'id, title',
            favorites: 'id, userId'
        });
        
        // DOM Elements
        const downloadedBooksDiv = document.getElementById('downloaded-books');
        const favoritesBooksDiv = document.getElementById('favorites-books');
        const authBtn = document.getElementById('auth-btn');
        const alertContainer = document.getElementById('alert-container');
        
        // Load books on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDownloadedBooks();
            await loadFavoriteBooks();
        });
        
        // Load downloaded books from IndexedDB
        async function loadDownloadedBooks() {
            try {
                const books = await db.books.toArray();
                if (books.length === 0) {
                    downloadedBooksDiv.innerHTML = `
                        <div style="grid-column: 1/-1;">
                            <div class="empty-state">
                                <div class="empty-icon">📚</div>
                                <div class="empty-text">ဆွဲယူထားသောစာအုပ်မရှိပါ</div>
                            </div>
                        </div>
                    `;
                } else {
                    downloadedBooksDiv.innerHTML = books.map(book => createBookCard(book, 'downloaded')).join('');
                }
            } catch (error) {
                console.error('Error loading downloaded books:', error);
                showAlert('အချက်အလက်ဆွဲယူမှုမအောင်မြင်ခြင်း', 'error');
            }
        }
        
        // Load favorite books from Supabase
        async function loadFavoriteBooks() {
            try {
                // Placeholder - replace with actual Supabase query
                favoritesBooksDiv.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-icon">❤️</div>
                            <div class="empty-text">သင်နှစ်သက်သောစာအုပ်မရှိပါ</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading favorite books:', error);
                showAlert('အချက်အလက်ဆွဲယူမှုမအောင်မြင်ခြင်း', 'error');
            }
        }
        
        // Create book card HTML
        function createBookCard(book, type) {
            return `
                <div class="book-card">
                    <div class="book-cover">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title || 'အမည်မသိ'}</div>
                        <div class="book-actions">
                            <button class="btn-read" onclick="readBook('${book.id}')">ဖတ်မည်</button>
                            <button class="btn-delete" onclick="deleteBook('${book.id}', '${type}')">ဖျက်မည်</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Read book
        function readBook(bookId) {
            window.location.href = `reader.html?id=${bookId}`;
        }
        
        // Delete book
        async function deleteBook(bookId, type) {
            const confirmed = await Swal.fire({
                title: 'အတည်ပြုခြင်း',
                text: 'ဤစာအုပ်ကိုဖျက်မည်သည်မှန်ပါသလား?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ဖျက်မည်',
                cancelButtonText: 'ပယ်ဖျက်မည်'
            });
            
            if (confirmed.isConfirmed) {
                try {
                    if (type === 'downloaded') {
                        await db.books.delete(bookId);
                        await loadDownloadedBooks();
                    }
                    showAlert('စာအုပ်ဖျက်ခြင်းအောင်မြင်ပါပြီ', 'success');
                } catch (error) {
                    console.error('Error deleting book:', error);
                    showAlert('စာအုပ်ဖျက်မှုမအောင်မြင်ခြင်း', 'error');
                }
            }
        }
        
        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }
        
        // Auth button handler
        authBtn.addEventListener('click', () => {
            // Implement authentication logic
            showAlert('အခုအချိန်တွင် Login ကိုအဆင်ပြေမည်ဖြစ်ပါသည်', 'success');
        });
    </script>
</body>
</html>
