    <div class="container" style="padding-top: 80px;">
        <h2><i class="fa-solid fa-bookmark" style="color: #f1c40f;"></i> My Personal Library</h2>
        <hr>
        <div id="library-container" class="scroll-wrapper" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 20px;">
            <p>Library ထဲမှာ စာအုပ်များ မရှိသေးပါ။</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>

    <script>
        function renderLibrary() {
            const container = document.getElementById('library-container');
            const savedIds = JSON.parse(localStorage.getItem('myLibrary')) || [];

            if (savedIds.length === 0) {
                container.innerHTML = "<p>သိမ်းဆည်းထားသော စာအုပ်မရှိသေးပါ။</p>";
                return;
            }

            // allBooks ထဲကနေ saved IDs နဲ့ ကိုက်ညီတာကို စစ်ထုတ်မယ်
            const myBooks = allBooks.filter(book => savedIds.includes(book.id));

            container.innerHTML = myBooks.map(book => `
                <div class="book-card" style="position: relative;">
                    <img src="${book.cover}" alt="${book.title}" onclick="location.href='detail.html?id=${book.id}'">
                    <p class="title">${book.title}</p>
                    <button onclick="removeFromLibrary(${book.id})" 
                            style="position: absolute; top: 5px; right: 5px; background: rgba(231, 76, 60, 0.9); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }

        // Data load ဖြစ်လာတာနဲ့ render လုပ်မယ်
        const checkData = setInterval(() => {
            if (typeof allBooks !== 'undefined' && allBooks.length > 0) {
                renderLibrary();
                clearInterval(checkData);
            }
        }, 500);
    </script>
