<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - SmartBookshelf (Robust Version)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>

    <style>
        :root { 
            --primary: #313336; 
            --danger: #ea4335; 
            --heart: #e11d48; 
            --bg: #f8f9fa;
            --shadow-sm: 0 2px 5px rgba(0,0,0,0.05);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Pyidaungsu', 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 50px;
            color: #202124;
        }
        
        .nav-header { 
            background: white; 
            padding: 15px 20px; 
            box-shadow: var(--shadow-sm); 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 1px solid #e8eaed;
        }
        
        .nav-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 20px;
        }
        
        .nav-container h2 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-container a { 
            text-decoration: none; 
            color: var(--primary); 
            font-weight: 500; 
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .container { 
            max-width: 1000px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }
        
        .section-title { 
            font-size: 1.2rem; 
            color: #202124; 
            margin: 30px 0 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-left: 4px solid var(--primary); 
            padding-left: 10px;
            font-weight: 600;
        }
        
        .section-title.fav { 
            border-left-color: var(--heart); 
        }

        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px;
            margin-bottom: 30px;
        }

        .book-card { 
            background: white; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: var(--shadow-md); 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .book-card:hover { 
            transform: translateY(-5px); 
            box-shadow: var(--shadow-lg);
        }

        .book-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer;
        }

        .book-card h3 { 
            font-size: 13px; 
            margin: 10px 0; 
            height: 38px; 
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #3c4043;
            font-weight: 600;
        }

        .actions { 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            margin-top: auto;
        }
        
        .btn { 
            border: none; 
            padding: 8px 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            transition: all 0.3s;
        }
        
        .btn-read { background: var(--primary); color: white; }
        .btn-info { background: #f1f3f4; color: #5f6368; }
        .btn-delete { background: #feeef3; color: var(--danger); }

        .empty-state { 
            text-align: center; 
            padding: 40px; 
            color: #70757a; 
            grid-column: 1/-1; 
            background: #fff; 
            border-radius: 12px;
        }
        
        .auth-notice {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none; 
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        
        .auth-notice .btn-login-sm {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            font-weight: 600;
        }
        
        #logout-btn {
            display: none;
            background: #feeef3;
            color: #e11d48;
            border: 1px solid #fda4af;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="nav-container">
            <h2><i class="fas fa-book-bookmark"></i> MY LIBRARY</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> ထွက်မည်</button>
                <a href="index.html"><i class="fa-solid fa-house"></i> ပင်မစာမျက်နှာ</a>
            </div>
        </div>
        <div id="login-reminder" class="auth-notice">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="auth-text">သင် Login မဝင်ထားပါ။ စက်ပြောင်းခြင်း သို့မဟုတ် Browser Cache ရှင်းလိုက်ပါက ဒေတာများ ပျောက်ဆုံးနိုင်ပါသည်။</span>
            </div>
            <a href="auth.html" id="auth-link" class="btn-login-sm">Login ဝင်မည်</a>
        </div>
    </div>

    <div class="container">
        <div class="section-title">
            <i class="fas fa-cloud-arrow-down"></i> အော့ဖ်လိုင်းစာအုပ်များ
        </div>
        <div id="library-grid" class="book-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #70757a;"><i class="fas fa-spinner loading"></i> အော်ဖ်လိုင်းစာအုပ်များ ဆွဲယူနေသည်...</p>
        </div>

        <div class="section-title fav">
            <i class="fas fa-heart" style="color: var(--heart);"></i> သင်ကြိုက်နှစ်သက်သောစာအုပ်များ
        </div>
        <div id="fav-view" class="book-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #70757a;"><i class="fas fa-spinner loading"></i> အသဲပေးထားသောစာအုပ်များ ဆွဲယူနေသည်...</p>
        </div>
    </div>

<script>
// Supabase Configuration
const SB_URL = "https://cmguamftohgcgwdggwde.supabase.co"; 
const SB_KEY = "sb_publishable_xiWtoACTDkbfjmz9RMxWdw_R5W1UtZ9";
const sb = supabase.createClient(SB_URL, SB_KEY);

// Dexie Configuration
const db = new Dexie("MyDigitalLibrary");
db.version(2).stores({ savedBooks: "id, title, author, cover, fileData, lastPage" });

// Global State
let currentUser = null;

// Page Initialization
window.onload = async () => {
    console.log("Initializing page...");
    await initAuth();
    await renderLibrary();
    await loadMyFavorites();
};

// Authentication Initialization & Listener
async function initAuth() {
    const reminder = document.getElementById('login-reminder');
    const logoutBtn = document.getElementById('logout-btn');

    // 1. Initial Session Check
    try {
        const { data: { session }, error } = await sb.auth.getSession();
        if (error) throw error;
        
        if (session && session.user) {
            currentUser = session.user;
            updateAuthUI(true);
            console.log("Initial session found:", currentUser.email);
            syncLikesToCloud(currentUser.id);
        } else {
            updateAuthUI(false);
            console.log("No initial session found.");
        }
    } catch (err) {
        console.error("Auth initialization error:", err.message);
        updateAuthUI(false);
    }

    // 2. Real-time Auth State Listener
    sb.auth.onAuthStateChange(async (event, session) => {
        console.log("Auth event triggered:", event);
        
        if (session && session.user) {
            currentUser = session.user;
            updateAuthUI(true);
            if (event === 'SIGNED_IN') {
                syncLikesToCloud(currentUser.id);
            }
        } else {
            currentUser = null;
            updateAuthUI(false);
        }
    });

    function updateAuthUI(isLoggedIn) {
        if (isLoggedIn) {
            reminder.style.display = 'none';
            logoutBtn.style.display = 'block';
        } else {
            reminder.style.display = 'flex';
            logoutBtn.style.display = 'none';
        }
    }
}

// Data Sync Logic (Robust Version)
async function syncLikesToCloud(userId) {
    if (!userId) return;
    
    try {
        const localLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
        if (localLikes.length === 0) {
            console.log("No local likes to sync.");
            return;
        }

        console.log(`Syncing ${localLikes.length} likes for user: ${userId}`);

        // Prepare data for Supabase
        const syncData = localLikes.map(id => ({ 
            user_id: userId, 
            book_id: parseInt(id) 
        }));

        // Perform Upsert with explicit onConflict
        const { data, error } = await sb
            .from('user_likes')
            .upsert(syncData, { onConflict: 'user_id,book_id' });

        if (error) {
            console.error("Supabase Upsert Error:", error.message);
            // Optional: Show toast if sync fails
        } else {
            console.log("Sync successful. Data:", data);
        }
    } catch (err) {
        console.error("Sync process failed:", err.message);
    }
}

// Logout Handler
async function handleLogout() {
    try {
        const { error } = await sb.auth.signOut();
        if (error) throw error;
        
        Swal.fire({ 
            title: 'Logout လုပ်ပြီးပါပြီ', 
            icon: 'success', 
            toast: true, 
            position: 'top-end', 
            showConfirmButton: false, 
            timer: 2000 
        });
        
        // Clear local state if needed, then reload
        setTimeout(() => window.location.reload(), 1000);
    } catch (err) {
        console.error("Logout error:", err.message);
        Swal.fire({ title: 'Logout မအောင်မြင်ပါ', text: err.message, icon: 'error' });
    }
}

// Render Offline Library (Dexie)
async function renderLibrary() {
    const grid = document.getElementById('library-grid');
    try {
        const books = await db.savedBooks.toArray();
        if (books.length === 0) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-download fa-2x"></i><p>သိမ်းထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }
        grid.innerHTML = books.map(book => `
            <div class="book-card" id="card-${book.id}">
                <img src="${book.cover}" alt="${book.title}" onclick="openReader('${book.id}')">
                <h3>${book.title}</h3>
                <div class="actions">
                    <button class="btn btn-read" onclick="openReader('${book.id}')"><i class="fas fa-book-open"></i> ဆက်ဖတ်မည်</button>
                    <button class="btn btn-delete" onclick="confirmDelete('${book.id}')"><i class="fas fa-trash"></i> ဖယ်ရှားမည်</button>
                </div>
            </div>
        `).join('');
    } catch (err) { 
        console.error("Library render error:", err.message);
        grid.innerHTML = `<p style="text-align:center; color:red;">စာအုပ်များပြသရာတွင် အမှားအယွင်းရှိပါသည်။</p>`;
    }
}

// Load Favorites (Supabase)
async function loadMyFavorites() {
    const favContainer = document.getElementById('fav-view');
    try {
        const likedIds = JSON.parse(localStorage.getItem('my_likes') || '[]');
        if (likedIds.length === 0) {
            favContainer.innerHTML = `<div class="empty-state"><i class="far fa-heart fa-2x"></i><p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }

        const numericIds = likedIds.map(id => parseInt(id));
        const { data, error } = await sb.from('books').select('id, title, cover').in('id', numericIds);
        
        if (error) throw error;

        if (!data || data.length === 0) {
            favContainer.innerHTML = `<div class="empty-state"><i class="far fa-heart fa-2x"></i><p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }

        favContainer.innerHTML = data.map(item => `
            <div class="book-card" onclick="location.href='detail.html?id=${item.id}'" style="cursor:pointer;">
                <img src="${item.cover}" alt="${item.title}">
                <h3>${item.title}</h3>
                <div class="actions">
                    <button class="btn btn-info"><i class="fas fa-info-circle"></i> အသေးစိတ်</button>
                </div>
            </div>
        `).join('');
    } catch (err) { 
        console.error("Favorites load error:", err.message);
        favContainer.innerHTML = `<p style="text-align:center; color:red;">အသဲပေးစာရင်းပြသရာတွင် အမှားအယွင်းရှိပါသည်။</p>`;
    }
}

// Helper Functions
function openReader(id) { 
    window.location.href = `reader.html?id=${id}&mode=offline`; 
}

function confirmDelete(id) {
    Swal.fire({
        title: 'ဖျက်မှာ သေချာလား?',
        text: "ဤစာအုပ်ကို အော့ဖ်လိုင်းသိမ်းဆည်းမှုမှ ဖယ်ရှားပါမည်။",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ea4335',
        confirmButtonText: 'ဖျက်မည်',
        cancelButtonText: 'မဖျက်တော့ပါ'
    }).then((result) => { 
        if (result.isConfirmed) deleteBook(id); 
    });
}

async function deleteBook(id) {
    try {
        // 1. Delete from Dexie
        await db.savedBooks.delete(id);
        await db.savedBooks.delete(Number(id));

        // 2. Delete from Supabase if logged in
        if (currentUser) {
            await Promise.all([
                sb.from('user_downloads').delete().eq('user_id', currentUser.id).eq('book_id', id),
                sb.from('user_likes').delete().eq('user_id', currentUser.id).eq('book_id', id)
            ]);
        }
        
        // 3. Update UI
        await renderLibrary();
        Swal.fire({ 
            title: 'ဖယ်ရှားပြီးပါပြီ', 
            icon: 'success', 
            toast: true, 
            position: 'top-end', 
            showConfirmButton: false, 
            timer: 2000 
        });
    } catch (err) {
        console.error("Delete error:", err.message);
        Swal.fire({ title: 'ဖယ်ရှားမှု မအောင်မြင်ပါ', icon: 'error' });
    }
}
</script>
</body>
</html>
