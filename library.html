<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Smart Bookshelf - Your Digital Library</title>
<meta name="title" content="Smart Bookshelf - Your Digital Library">
<meta name="description" content="Discover, search, and manage your favorite books with Smart Bookshelf. Access a wide range of categories including Xianxia, Technical, Novels, and more for offline reading.">
<meta name="keywords" content="Smart Bookshelf, Digital Library, Free Books, Myanmar Bookshelf, PDF Reader, Offline Reading, Book Management">
<meta name="author" content="jokertalor-cpu">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .library-container { padding: 80px 15px; max-width: 1000px; margin: 0 auto; }
        
        /* Search & Filter Section */
        .lib-controls { margin-bottom: 25px; }
        .lib-search-wrapper { position: relative; margin-bottom: 15px; }
        .lib-search-input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 25px;
            border: 1px solid #ddd; font-size: 15px; outline: none; transition: 0.3s;
        }
        .lib-search-input:focus { border-color: #2196F3; box-shadow: 0 0 8px rgba(33,150,243,0.1); }
        .lib-search-icon { position: absolute; left: 15px; top: 15px; color: #888; }

        /* Category Filter Chips */
        .category-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .category-scroll::-webkit-scrollbar { display: none; /* Chrome/Safari */ }
        .filter-chip {
            padding: 6px 15px; border-radius: 20px; background: #eee;
            font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s;
            border: 1px solid transparent;
        }
        .filter-chip.active { background: #2196F3; color: white; border-color: #2196F3; }

        /* Grid */
        .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .lib-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .lib-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .lib-info { padding: 8px; text-align: center; flex-grow: 1; }
        .lib-title { font-size: 13px; font-weight: bold; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .lib-actions { display: flex; border-top: 1px solid #eee; }
        .lib-actions button { flex: 1; padding: 10px; border: none; cursor: pointer; background: white; }
        .btn-read-lib { color: #2196F3; border-right: 1px solid #eee !important; }
        .btn-delete-lib { color: #ff4757; }
       .search-wrapper {
    display: flex;
    align-items: center;
}

.search-box {
    width: 0;
    overflow: hidden;
    transition: width 0.3s ease;
}

.search-wrapper.active .search-box {
    width: 200px; /* စိတ်ကြိုက် width ထားနိုင်သည် */
    margin-right: 5px;
    </style>
</head>
<body>
 
<div class="menu-overlay" id="menu-overlay"></div>

<nav class="navbar">
    <div class="nav-container">
        <button class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <div class="logo">
            <img src="photo_2026-03-20_09-18-40.jpg" alt="logo">
        </div>

        <div class="search-wrapper">
            <div class="search-box" id="search-box">
                <input type="text" id="lib-search-input" placeholder="Library ထဲရှိစာအုပ်ရှာရန်..." oninput="applyFilters()" autocomplete="off">
            </div>
            <button id="search-trigger" class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> HOME</a></li>
            <li><a href="latest.html"><i class="fa-solid fa-book"></i> LATEST</a></li>
            <li><a href="authors.html"><i class="fa-solid fa-pen-nib"></i> AUTHORS</a></li>
            <li><a href="library.html" class="active"><i class="fa-solid fa-bookmark"></i> LIBRARY</a></li>
        </ul>
    </div>
</nav>
    <div class="library-container">
        <div class="lib-controls">
            <div class="lib-search-wrapper">
                <i class="fa-solid fa-magnifying-glass lib-search-icon"></i>
                <input type="text" id="lib-search-input" class="lib-search-input" placeholder="အမည်ဖြင့် ရှာရန်..." oninput="applyFilters()">
            </div>

            <div class="category-scroll" id="category-filter">
                <div class="filter-chip active" onclick="filterByCategory('all', this)">ALL</div>
                </div>
        </div>

        <div id="library-list" class="lib-grid">
            </div>
    </div>

    <script>
        const db = new Dexie("MmBookshelfDB");
        db.version(1).stores({
            downloaded_books: 'id, title, author, cover, category, fileBlob, lastPage'
        });

        let allLocalBooks = [];
        let currentCategory = 'all';

        async function initLibrary() {
            try {
                allLocalBooks = await db.downloaded_books.toArray();
                
                // ၁။ Category Chips များကို Dynamic ထုတ်ပေးခြင်း
                setupCategoryChips();
                // ၂။ စာအုပ်များကို ပြသခြင်း
                applyFilters();
            } catch (err) {
                console.error(err);
            }
        }

        function setupCategoryChips() {
            const container = document.getElementById('category-filter');
            // Database ထဲမှာ တကယ်ရှိတဲ့ category တွေကိုပဲ ယူမယ်
            const categories = [...new Set(allLocalBooks.map(b => b.category).filter(c => c))];
            
            categories.forEach(cat => {
                const chip = document.createElement('div');
                chip.className = 'filter-chip';
                chip.innerText = cat.toUpperCase();
                chip.onclick = () => filterByCategory(cat, chip);
                container.appendChild(chip);
            });
        }

        function filterByCategory(category, element) {
            currentCategory = category;
            // UI Active class ပြောင်းခြင်း
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const searchTxt = document.getElementById('lib-search-input').value.toLowerCase().trim();
            
            const filtered = allLocalBooks.filter(book => {
                const matchesSearch = book.title.toLowerCase().includes(searchTxt) || 
                                     (book.author && book.author.toLowerCase().includes(searchTxt));
                const matchesCategory = (currentCategory === 'all') || (book.category === currentCategory);
                
                return matchesSearch && matchesCategory;
            });

            renderBooks(filtered);
        }

        function renderBooks(books) {
            const container = document.getElementById('library-list');
            if (books.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align: center; margin-top: 30px; color: #888;'>စာအုပ်ရှာမတွေ့ပါ။</p>";
                return;
            }

            container.innerHTML = books.map(book => `
                <div class="lib-card">
                    <img src="${book.cover}" onerror="this.src='https://via.placeholder.com/150x200'">
                    <div class="lib-info">
                        <div class="lib-title">${book.title}</div>
                        <small style="color: #888;">${book.category || 'General'}</small>
                    </div>
                    <div class="lib-actions">
                        <button class="btn-read-lib" onclick="location.href='reader.html?id=${book.id}&mode=offline'">
                            <i class="fa-solid fa-book-open"></i> Read
                        </button>
                        <button class="btn-delete-lib" onclick="deleteBook('${book.id}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteBook(id) {
            if (confirm("ဤစာအုပ်ကို Library ထဲမှ ဖျက်လိုပါသလား?")) {
                await db.downloaded_books.delete(id);
                await db.downloaded_books.delete(Number(id));
                allLocalBooks = await db.downloaded_books.toArray(); // List ကို update လုပ်မယ်
                applyFilters();
            }
        }

        document.addEventListener('DOMContentLoaded', initLibrary);
    </script>
    <script>
    // --- Mobile Menu Logic ---
const menuToggle = document.querySelector('#mobile-menu');
const navMenu = document.querySelector('#nav-menu');
const overlay = document.querySelector('#menu-overlay');

if (menuToggle) {
    menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        overlay.classList.toggle('active');
        menuToggle.classList.toggle('active'); // Hamburger ကို X ပြောင်းရန်
    });
}

if (overlay) {
    overlay.addEventListener('click', () => {
        navMenu.classList.remove('active');
        overlay.classList.remove('active');
        menuToggle.classList.remove('active');
    });
}

// --- Search Box Expand Logic (index.html အတိုင်း) ---
const searchTrigger = document.getElementById('search-trigger');
if (searchTrigger) {
    searchTrigger.addEventListener('click', (e) => {
        e.preventDefault();
        const wrapper = document.querySelector('.search-wrapper');
        wrapper.classList.toggle('active');
        if (wrapper.classList.contains('active')) {
            document.getElementById('lib-search-input').focus();
        }
    });
}
</script>
</body>
</html>
