<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - SmartBookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>

    <style>
        :root { 
            --primary: #313336; 
            --danger: #ea4335; 
            --heart: #e11d48; 
            --bg: #f8f9fa;
            --shadow-sm: 0 2px 5px rgba(0,0,0,0.05);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Pyidaungsu', 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 50px;
            color: #202124;
        }
        
        /* Navbar အဆင့်မြှင့်တင်ခြင်း */
        .nav-header { 
            background: white; 
            padding: 15px 20px; 
            box-shadow: var(--shadow-sm); 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 1px solid #e8eaed;
        }
        
        .nav-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 20px;
        }
        
        .nav-container h2 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-container a { 
            text-decoration: none; 
            color: var(--primary); 
            font-weight: 500; 
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }
        
        .nav-container a:hover {
            color: var(--danger);
        }

        .container { 
            max-width: 1000px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }
        
        .section-title { 
            font-size: 1.2rem; 
            color: #202124; 
            margin: 30px 0 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-left: 4px solid var(--primary); 
            padding-left: 10px;
            font-weight: 600;
        }
        
        .section-title.fav { 
            border-left-color: var(--heart); 
        }

        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px;
            margin-bottom: 30px;
        }

        .book-card { 
            background: white; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: var(--shadow-md); 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .book-card:hover { 
            transform: translateY(-5px); 
            box-shadow: var(--shadow-lg);
        }

        .book-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .book-card img:hover {
            transform: scale(1.05);
        }

        .book-card h3 { 
            font-size: 13px; 
            margin: 10px 0; 
            height: 38px; 
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #3c4043;
            font-weight: 600;
        }

        .actions { 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            margin-top: auto;
        }
        
        .btn { 
            border: none; 
            padding: 8px 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            transition: all 0.3s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-read { 
            background: var(--primary); 
            color: white;
        }
        
        .btn-read:hover {
            background: #1f2023;
        }
        
        .btn-info { 
            background: #f1f3f4; 
            color: #5f6368;
        }
        
        .btn-info:hover {
            background: #e8eaed;
        }
        
        .btn-delete { 
            background: #feeef3; 
            color: var(--danger);
        }
        
        .btn-delete:hover {
            background: #fdd9e5;
        }

        .empty-state { 
            text-align: center; 
            padding: 40px; 
            color: #70757a; 
            grid-column: 1/-1; 
            background: #fff; 
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }
        
        .empty-state i {
            margin-bottom: 10px;
            opacity: 0.5;
        }
        
        .empty-state p {
            margin: 10px 0 0;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav-container h2 {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .book-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px; 
            }
            .book-card img { 
                height: 180px; 
            }
            .section-title {
                font-size: 1rem;
            }
        }
        
        /* Authentication Notice အဆင့်မြှင့်တင်ခြင်း */
        .auth-notice {
            background: linear-gradient(135deg, #fff3cd 0%, #fffbea 100%);
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            box-shadow: var(--shadow-sm);
        }
        
        .auth-notice i {
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .auth-notice span {
            flex: 1;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .auth-notice .btn-login-sm {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            font-weight: 600;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        
        .auth-notice .btn-login-sm:hover {
            background: #1f2023;
        }
        
        #logout-btn {
            display: none;
            background: #feeef3;
            color: #e11d48;
            border: 1px solid #fda4af;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        #logout-btn:hover {
            background: #fdd9e5;
        }
        
        /* Loading State */
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="nav-container">
            <h2><i class="fas fa-book-bookmark"></i> MY LIBRARY</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> ထွက်မည်</button>
                <a href="index.html"><i class="fa-solid fa-house"></i> ပင်မစာမျက်နှာ</a>
            </div>
        </div>
        <div id="login-reminder" class="auth-notice">
            <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
                <i class="fas fa-exclamation-triangle"></i>
                <span>သင် Login မဝင်ထားပါ။ စက်ပြောင်းခြင်း သို့မဟုတ် Browser Cache ရှင်းလိုက်ပါက ဒေတာများ ပျောက်ဆုံးနိုင်ပါသည်။</span>
            </div>
            <a href="auth.html" class="btn-login-sm">Login ဝင်မည်</a>
        </div>
    </div>

    <div class="container">
        <div class="section-title">
            <i class="fas fa-cloud-arrow-down"></i> အော့ဖ်လိုင်းစာအုပ်များ
        </div>
        <div id="library-grid" class="book-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #70757a;"><i class="fas fa-spinner loading"></i> အော်ဖ်လိုင်းစာအုပ်များ ဆွဲယူနေသည်...</p>
        </div>

        <div class="section-title fav">
            <i class="fas fa-heart" style="color: var(--heart);"></i> သင်ကြိုက်နှစ်သက်သောစာအုပ်များ
        </div>
        <div id="fav-view" class="book-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #70757a;"><i class="fas fa-spinner loading"></i> အသဲပေးထားသောစာအုပ်များ ဆွဲယူနေသည်...</p>
        </div>
    </div>

<script>
   const SB_URL = "https://cmguamftohgcgwdggwde.supabase.co"; 
const SB_KEY = "sb_publishable_xiWtoACTDkbfjmz9RMxWdw_R5W1UtZ9";
const sb = supabase.createClient(SB_URL, SB_KEY);

const db = new Dexie("MyDigitalLibrary");
db.version(2).stores({ savedBooks: "id, title, author, cover, fileData, lastPage" });

// စာမျက်နှာစဖွင့်ချိန်တွင် အားလုံးကို စစ်ဆေးခြင်း
window.onload = () => {
    setupAuthListener(); 
    renderLibrary();    
    loadMyFavorites();  
};

// Login Status ကို အမြဲနားထောင်နေမည့် Function
function setupAuthListener() {
    const reminder = document.getElementById('login-reminder');
    const logoutBtn = document.getElementById('logout-btn');

    sb.auth.onAuthStateChange(async (event, session) => {
        if (session && session.user) {
            reminder.style.display = 'none';
            if(logoutBtn) logoutBtn.style.display = 'block';

            // Cloud နှင့် Sync လုပ်ခြင်း
            syncLikesToCloud(session.user.id);
            console.log("Syncing activity for:", session.user.email);
        } else {
            reminder.style.display = 'flex';
            if(logoutBtn) logoutBtn.style.display = 'none';
        }
    });
}

// Local Likes များကို Cloud ပေါ်သို့ တင်ပေးခြင်း
async function syncLikesToCloud(userId) {
    try {
        const localLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
        if (localLikes.length > 0) {
            const syncData = localLikes.map(id => ({ user_id: userId, book_id: parseInt(id) }));
            const { error } = await sb.from('user_likes').upsert(syncData);
            if (error) {
                console.error("Sync error:", error);
            } else {
                console.log("Successfully synced likes to cloud");
            }
        }
    } catch (err) {
        console.error("Error during sync:", err);
    }
}

// Logout လုပ်ဆောင်ချက်
async function handleLogout() {
    try {
        const { error } = await sb.auth.signOut();
        if (!error) {
            Swal.fire({ 
                title: 'Logout လုပ်ပြီးပါပြီ', 
                icon: 'success', 
                toast: true, 
                position: 'top-end', 
                showConfirmButton: false, 
                timer: 2000 
            });
            // Refresh page after logout
            setTimeout(() => window.location.reload(), 1000);
        } else {
            Swal.fire({ 
                title: 'Logout မအောင်မြင်ခြင်း', 
                text: error.message, 
                icon: 'error', 
                toast: true, 
                position: 'top-end', 
                showConfirmButton: false, 
                timer: 2000 
            });
        }
    } catch (err) {
        console.error("Logout error:", err);
    }
}

// Offline (Dexie) Library ကို ပြသခြင်း
async function renderLibrary() {
    const grid = document.getElementById('library-grid');
    try {
        const books = await db.savedBooks.toArray();
        if (books.length === 0) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-download fa-2x"></i><p>သိမ်းထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }
        grid.innerHTML = books.map(book => `
            <div class="book-card" id="card-${book.id}">
                <img src="${book.cover}" alt="${book.title}" onclick="openReader('${book.id}')">
                <h3 title="${book.title}">${book.title}</h3>
                <div class="actions">
                    <button class="btn btn-read" onclick="openReader('${book.id}')"><i class="fas fa-book-open"></i> ဆက်ဖတ်မည်</button>
                    <button class="btn btn-delete" onclick="confirmDelete('${book.id}')"><i class="fas fa-trash"></i> ဖယ်ရှားမည်</button>
                </div>
            </div>
        `).join('');
    } catch (err) { 
        console.error("Error rendering library:", err);
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle fa-2x"></i><p>စာအုပ်များ ဆွဲယူရာတွင် အမှားအယွင်းဖြစ်ခဲ့ပါသည်။</p></div>`;
    }
}

// အသဲပေးထားသော စာရင်းကို Supabase မှ ဆွဲယူပြသခြင်း
async function loadMyFavorites() {
    const likedIds = JSON.parse(localStorage.getItem('my_likes') || '[]');
    const favContainer = document.getElementById('fav-view');

    if (likedIds.length === 0) {
        favContainer.innerHTML = `<div class="empty-state"><i class="far fa-heart fa-2x"></i><p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
        return;
    }

    try {
        const numericIds = likedIds.map(id => parseInt(id));
        const { data, error } = await sb.from('books').select('id, title, cover').in('id', numericIds);
        if (error) throw error;

        if (!data || data.length === 0) {
            favContainer.innerHTML = `<div class="empty-state"><i class="far fa-heart fa-2x"></i><p>အသဲပေးထားသောစာအုပ် မရှိသေးပါ။</p></div>`;
            return;
        }

        favContainer.innerHTML = data.map(item => `
            <div class="book-card" onclick="location.href='detail.html?id=${item.id}'" style="cursor:pointer;">
                <img src="${item.cover}" alt="${item.title}">
                <h3 title="${item.title}">${item.title}</h3>
                <div class="actions">
                    <button class="btn btn-info"><i class="fas fa-info-circle"></i> အသေးစိတ်</button>
                </div>
            </div>
        `).join('');
    } catch (err) { 
        console.error("Error loading favorites:", err);
        favContainer.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle fa-2x"></i><p>အသဲပေးထားသောစာအုပ်များ ဆွဲယူရာတွင် အမှားအယွင်းဖြစ်ခဲ့ပါသည်။</p></div>`;
    }
}

function openReader(id) { 
    window.location.href = `reader.html?id=${id}&mode=offline`; 
}

function confirmDelete(id) {
    Swal.fire({
        title: 'ဖျက်မှာ သေချာလား?',
        text: 'ဤလုပ်ဆောင်ချက်ကို ပြန်လည်ပြင်ဆင်၍မရပါ။',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ea4335',
        confirmButtonText: 'ဖျက်မည်',
        cancelButtonText: 'မဖျက်တော့ပါ'
    }).then((result) => { 
        if (result.isConfirmed) deleteBook(id); 
    });
}

// Local ရော Cloud ပါ ဖျက်မည့် Function
async function deleteBook(id) {
    try {
        await db.savedBooks.delete(id);
        await db.savedBooks.delete(Number(id));

        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            await Promise.all([
                sb.from('user_downloads').delete().eq('user_id', user.id).eq('book_id', id),
                sb.from('user_likes').delete().eq('user_id', user.id).eq('book_id', id)
            ]);
        }
        renderLibrary();
        Swal.fire({ 
            title: 'ဖယ်ရှားပြီးပါပြီ', 
            icon: 'success', 
            toast: true, 
            position: 'top-end', 
            showConfirmButton: false, 
            timer: 2000 
        });
    } catch (err) {
        console.error("Error deleting book:", err);
        Swal.fire({ 
            title: 'အမှားအယွင်း', 
            text: 'စာအုပ်ကို ဖယ်ရှားရာတွင် အမှားအယွင်းဖြစ်ခဲ့ပါသည်။', 
            icon: 'error', 
            toast: true, 
            position: 'top-end', 
            showConfirmButton: false, 
            timer: 2000 
        });
    }
}
</script>
</body>
</html>
