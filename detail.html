<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - smart-bookshelf</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .detail-container { padding: 80px 15px 20px; max-width: 800px; margin: 0 auto; }
        .book-hero { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .book-hero img { width: 180px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .book-meta { flex: 1; min-width: 250px; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; text-decoration: none; transition: 0.3s; }
        .btn-read { background: #2196F3; color: white; }
        .btn-download { background: #2ecc71; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .related-section { margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; }
         .search-wrapper {
    display: flex;
    align-items: center;
}

.search-box {
    width: 0;
    overflow: hidden;
    transition: width 0.3s ease;
}

.search-wrapper.active .search-box {
    width: 200px; /* စိတ်ကြိုက် width ထားနိုင်သည် */
    margin-right: 5px;
}
    </style>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
   <div class="menu-overlay" id="menu-overlay"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="logo">
                <img src="photo_2026-03-20_09-18-40.jpg" alt="logo">
            </div>

            <div class="search-wrapper">
    <div class="search-box" id="search-box">
        <input type="text" id="search-input" placeholder="စာအုပ်အမည်ဖြင့်ရှာရန်..." oninput="handleInput()" onkeydown="handleKeyDown(event)" autocomplete="off">
        <div id="search-suggestions" class="suggestions-list"></div>
    </div>
    <button id="search-trigger" class="search-btn">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>
</div>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> HOME</a></li>
                <li><a href="latest.html"><i class="fa-solid fa-book"></i> LATEST</a></li>
                <li><a href="authors.html"><i class="fa-solid fa-pen-nib"?></i>AUTHORS</a></li>
                 <li><a href="library.html" class="active"><i class="fa-solid fa-bookmark"></i> LIBRARY</a></li>
            </ul>
        </div>
    </nav>


    <div class="detail-container" id="detail-content">
        <p style="text-align:center;">Loading book details...</p>
    </div>

    <div class="container related-section">
        <h3><i class="fa-solid fa-layer-group"></i> သင်ကြိုက်နှစ်သက်နိုင်သည့် စာအုပ်များ</h3>
        <div class="scroll-wrapper" id="related-books-container">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="mainscript.js"></script>

    <script>
        async function initDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookId = urlParams.get('id');

            if (!bookId) {
                window.location.href = 'index.html';
                return;
            }

            // mainscript.js ထဲက allBooks data အဆင်သင့်ဖြစ်မဖြစ် စောင့်ကြည့်မယ်
            const checkData = setInterval(() => {
                if (typeof allBooks !== 'undefined' && allBooks.length > 0) {
                    const currentBook = allBooks.find(b => b.id == bookId);
                    if (currentBook) {
                        displayBookDetail(currentBook);
                        displayRelatedBooks(currentBook);
                    }
                    clearInterval(checkData);
                }
            }, 300);
        }

     function displayBookDetail(book) {
    const container = document.getElementById('detail-content');
    container.innerHTML = `
        <div class="book-hero">
            <img src="${book.cover}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/180x250'">
            <div class="book-meta">
                <h1 style="margin:0 0 10px 0;">${book.title}</h1>
                <p style="color:#666; margin:5px 0;"><i class="fa-solid fa-user-pen"></i> စာရေးသူ - ${book.author || 'Unknown'}</p>
                <p style="color:#666; margin:5px 0;"><i class="fa-solid fa-tags"></i> အမျိုးအစား - ${book.category || 'General'}</p>
              
                <div class="action-buttons">
<a href="${book.read_link}" target="_blank" class="btn btn-read">
                            <i class="fa-solid fa-book-open"></i> Online Read
                        </a>
                    <button class="btn btn-download" id="download-btn-trigger">
                        <i class="fa-solid fa-download"></i> Download (${book.file_size || '0 MB'})
                    </button>
                </div>
            </div>
        </div>
        <div class="description">
            <h3 style="border-left: 4px solid #2196F3; padding-left: 10px;">စာအုပ်အညွှန်း</h3>
            <p style="line-height: 1.6; color: #444;">${book.description || 'ဤစာအုပ်အတွက် အညွှန်းမရှိသေးပါ။'}</p>
        </div>
    `;

    // ခလုတ်နှိပ်ရင် Hybrid Download အလုပ်လုပ်ဖို့ Event ကြေညာပေးရပါမယ်
    document.getElementById('download-btn-trigger').addEventListener('click', () => {
        handleHybridDownload(book);
    });
}
        function displayRelatedBooks(currentBook) {
            const relatedContainer = document.getElementById('related-books-container');
            
            // ၁။ Author တူတာကို အရင်ရှာမယ်
            let authorMatches = allBooks.filter(b => b.author === currentBook.author && b.id !== currentBook.id);
            
            // ၂။ Category တူတာကို ထပ်ရှာမယ် (Author တူထဲမှာ မပါသေးတာတွေကိုပဲ ယူမယ်)
            let categoryMatches = allBooks.filter(b => 
                b.category === currentBook.category && 
                b.author !== currentBook.author && 
                b.id !== currentBook.id
            );

            // စုစုပေါင်း ၂၀ လက်ခံမယ် (Author match အရင်၊ ပြီးမှ Category match)
            let finalRelated = [...authorMatches, ...categoryMatches].slice(0, 20);

            if (finalRelated.length > 0) {
                // mainscript.js ထဲက renderBooks function ကို display logic အဖြစ်သုံးနိုင်သလို
                // Custom ကတ်ပြားပုံစံနဲ့ ဒီမှာပဲ တန်းရေးလို့ရပါတယ်
                relatedContainer.innerHTML = finalRelated.map(book => `
                    <div class="book-card" onclick="location.href='detail.html?id=${book.id}'" style="flex: 0 0 140px; cursor: pointer;">
                        <img src="${book.cover}" alt="${book.title}">
                        <p class="title" style="font-size: 13px; font-weight: bold; margin-top:5px; height: 32px; overflow: hidden;">${book.title}</p>
                        <small style="color: #888;">${book.author}</small>
                    </div>
                `).join('');
            } else {
                relatedContainer.innerHTML = "<p>သက်ဆိုင်ရာ စာအုပ်များ မရှိသေးပါ။</p>";
            }
        }

        initDetail();
    </script>
</body>
</html>
