<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; }
        body { font-family: 'Pyidaungsu', sans-serif; margin: 0; background: #f8f9fa; }
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); text-decoration: none; }
        .nav-links a { text-decoration: none; color: #5f6368; margin-left: 20px; font-weight: bold; }
        .container { max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .book-hero { display: flex; gap: 40px; flex-wrap: wrap; }
        .cover-box { flex: 0 0 240px; height: 340px; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        .book-info { flex: 1; min-width: 300px; }
        .book-info h1 { margin: 0 0 20px 0; font-size: 28px; color: #202124; }
        .meta { margin-bottom: 12px; font-size: 17px; display: flex; align-items: center; gap: 12px; }
        .meta i { color: var(--primary); width: 20px; }
        .actions { display: flex; align-items: center; gap: 12px; margin-top: 35px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; flex: 1; min-width: 140px; }
        .btn-read { background: var(--primary); color: white; text-decoration: none; }
        #like-btn { background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; }
        #progress-ui { display: none; position: relative; width: 65px; height: 65px; }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 5; }
        .circle-bar { fill: none; stroke: var(--success); stroke-width: 5; stroke-dasharray: 126; stroke-dashoffset: 126; transition: 0.2s; transform: rotate(-90deg); transform-origin: center; }
        .pct-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; color: var(--success); }
        .related-box { margin-top: 50px; padding-bottom: 20px; }
        .related-grid { display: flex; gap: 20px; overflow-x: auto; padding: 15px 5px; scroll-behavior: smooth; }
        .item-card { flex: 0 0 150px; cursor: pointer; }
        .item-img { width: 150px; height: 220px; border-radius: 12px; overflow: hidden; background: #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-card p { margin-top: 10px; font-size: 14px; font-weight: 600; color: #3c4043; height: 40px; overflow: hidden; }
        .description-box { margin-top: 30px; padding-top: 25px; border-top: 1px solid #eee; }
        .description-text { font-size: 16px; line-height: 1.8; color: #5f6368; white-space: pre-line; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SMART BOOKSHELF</a>
        <div class="nav-links">
            <a href="index.html">ပင်မစာမျက်နှာ</a>
            <a href="library.html"><i class="fas fa-book"></i> ကျွန်ုပ်၏စာကြည့်တိုက်</a>
        </div>
    </nav>

    <div class="container" id="main-content">
        <div style="text-align:center; padding: 100px;"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--primary)"></i></div>
    </div>

    <div class="container related-box">
        <h3 style="margin-bottom:20px;">ဆက်စပ်စာအုပ်များ</h3>
        <div id="related-view" class="related-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script>
        const supabaseUrl = 'https://cmguamftohgcgwdggwde.supabase.co';
        const supabaseKey = 'sb_publishable_xiWtoACTDkbfjmz9RMxWdw_R5W1UtZ9';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        const db = new Dexie("MyDigitalLibrary");
        db.version(2).stores({ savedBooks: "id, title, author, cover, fileData, lastPage" });

        let activeBook = null;

        async function loadPage() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;

            try {
                const { data, error } = await sb.from('books').select('*').eq('id', id).maybeSingle();
                if (error || !data) throw error;

                activeBook = data;
                renderUI(data);
                checkLikeStatus();
                // ဒီနေရာမှာ parameter ၃ ခု တိတိကျကျ ပေးထားပါတယ်
                loadMoreRelatedBooks(data.category, data.author, data.id);
            } catch (err) { console.error(err); }
        }

        function renderUI(data) {
            document.getElementById('main-content').innerHTML = `
                <div class="book-hero">
                    <div class="cover-box"><img src="${data.cover}"></div>
                    <div class="book-info">
                        <h1>${data.title}</h1>
                        <div class="meta"><i class="fas fa-user-tie"></i> <span>စာရေးသူ: ${data.author}</span></div>
                        <div class="meta"><i class="fas fa-list"></i> <span>အမျိုးအစား: ${data.category}</span></div>
                        <div class="actions">
                            <a href="${data.read_link}" target="_blank" class="btn btn-read">ဖတ်မည်</a>
                            <button onclick="startDownload()" id="dl-button" class="btn">ဒေါင်းလုဒ်</button>
                            <button onclick="toggleLike()" id="like-btn" class="btn"><i class="fa-regular fa-heart"></i> <span id="like-label">အသဲပေးမည်</span></button>
                            <div id="progress-ui">
                                <svg width="60" height="60"><circle class="circle-bg" cx="30" cy="30" r="20"></circle><circle id="progress-bar" class="circle-bar" cx="30" cy="30" r="20"></circle></svg>
                                <div id="pct-label" class="pct-val">0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="description-box"><h3>စာအုပ်အညွှန်း</h3><div class="description-text">${data.description || 'အညွှန်းမရှိပါ။'}</div></div>
            `;
        }

        async function startDownload() {
            const btn = document.getElementById('dl-button');
            const ui = document.getElementById('progress-ui');
            btn.style.display = 'none'; ui.style.display = 'block';
            try {
                await sb.rpc('increment_download', { row_id: activeBook.id });
                const res = await fetch(activeBook.download_link);
                const reader = res.body.getReader();
                const total = +res.headers.get('Content-Length') || 0;
                let received = 0, chunks = [];
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    if (total > 0) {
                        const pct = Math.round((received / total) * 100);
                        document.getElementById('pct-label').innerText = pct + "%";
                        document.getElementById('progress-bar').style.strokeDashoffset = 126 - (126 * pct) / 100;
                    }
                }
                const blob = new Blob(chunks, { type: 'application/pdf' });
                await db.savedBooks.put({ id: activeBook.id.toString(), title: activeBook.title, author: activeBook.author, cover: activeBook.cover, fileData: blob });
                Swal.fire('အောင်မြင်ပါသည်', 'စာအုပ်စင်ထဲ ထည့်လိုက်ပါပြီ', 'success');
            } catch (e) { console.error(e); }
            finally { btn.style.display = 'flex'; ui.style.display = 'none'; }
        }

        async function toggleLike() {
            let likes = JSON.parse(localStorage.getItem('my_likes') || '[]');
            const id = activeBook.id.toString();
            const isLiked = likes.includes(id);
            try {
                if (isLiked) {
                    await sb.rpc('decrement_likes', { row_id: activeBook.id });
                    likes = likes.filter(i => i !== id);
                } else {
                    await sb.rpc('increment_likes', { row_id: activeBook.id });
                    likes.push(id);
                }
                localStorage.setItem('my_likes', JSON.stringify(likes));
                updateLikeUI(!isLiked);
            } catch (e) { console.error(e); }
        }

        function checkLikeStatus() {
            const likes = JSON.parse(localStorage.getItem('my_likes') || '[]');
            updateLikeUI(likes.includes(activeBook.id.toString()));
        }

        function updateLikeUI(isLiked) {
            const btn = document.getElementById('like-btn');
            if(!btn) return;
            btn.style.color = isLiked ? '#e11d48' : '#64748b';
            btn.querySelector('i').className = isLiked ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
            document.getElementById('like-label').innerText = isLiked ? 'အသဲပေးထားပြီး' : 'အသဲပေးမည်';
        }

        async function loadMoreRelatedBooks(cat, auth, currentId) {
            const view = document.getElementById('related-view');
            try {
                // ၁။ စာရေးဆရာတူတာ အရင်ရှာ
                const { data: aData } = await sb.from('books').select('id,title,cover,author').eq('author', auth).neq('id', currentId).limit(10);
                let list = [...(aData || [])];

                // ၂။ ၁၀ အုပ်မပြည့်ရင် Category တူတာထပ်ရှာ
                if (list.length < 10) {
                    const ids = list.map(b => b.id);
                    ids.push(currentId);
                    const { data: cData } = await sb.from('books').select('id,title,cover,author').eq('category', cat).not('id', 'in', `(${ids.join(',')})`).limit(10 - list.length);
                    if (cData) list = [...list, ...cData];
                }

                view.innerHTML = list.map(item => `
                    <div class="item-card" onclick="location.href='detail.html?id=${item.id}'">
                        <div class="item-img"><img src="${item.cover}"></div>
                        <p>${item.title}</p>
                        <small style="color:var(--primary)">${item.author}</small>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        window.onload = loadPage;
    </script>
</body>
</html>
