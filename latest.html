    <style>

/* စာသားအောက်က မျဉ်းတားတာ ဖျောက်ခြင်း */
.book-card a {
    text-decoration: none;
    color: inherit;
}

/* စာအုပ်နာမည် ၂ ကြောင်းထက်ပိုရင် ... ပြခြင်း */
.book-title {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    height: 2.8em; /* line-height ပေါ်မူတည်ပြီး ချိန်ရန် */
    line-height: 1.4em;
    font-size: 14px;
    font-weight: 600;
    margin: 8px 0 4px;
}

/* Ranking Tag Design - ထူးထူးခြားခြားဖြစ်အောင် */
.rank-tag {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 14px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    z-index: 5;
}

/* Rank အလိုက် အရောင်ခွဲခြင်း */
.rank-1 { background: linear-gradient(45deg, #ffd700, #ffae00); border: 2px solid #fff; } /* Gold */
.rank-2 { background: linear-gradient(45deg, #c0c0c0, #8e8e8e); border: 2px solid #fff; } /* Silver */
.rank-3 { background: linear-gradient(45deg, #cd7f32, #a0522d); border: 2px solid #fff; } /* Bronze */
.rank-other { background: rgba(0, 0, 0, 0.6); }

/* Download Count တစ်ညီတည်းဖြစ်အောင် */
.download-info {
    font-size: 12px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 5px;
}

.pop-info { margin-top: 10px; }
.pop-info h4 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pop-info span { font-size: 13px; color: #e11d48; font-weight: bold; }
    </style>
