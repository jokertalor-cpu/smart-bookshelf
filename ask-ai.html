<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask AI - Smart Bookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; }
        .chat-container { max-width: 600px; margin: 50px auto; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        .chat-header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.2rem; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 80%; line-height: 1.5; }
        .user-msg { background: var(--primary); color: white; align-self: flex-end; }
        .ai-msg { background: #e9ecef; color: #333; align-self: flex-start; }
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header"><i class="fas fa-robot"></i> Ask AI Assistant</div>
    <div id="chat-box">
        <div class="message ai-msg">မင်္ဂလာပါ! ကျွန်တော်က Smart Bookshelf ရဲ့ AI ဖြစ်ပါတယ်။ စာအုပ်တွေအကြောင်း ဘာများမေးချင်ပါသလဲ?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="ဒီမှာ မေးခွန်းရိုက်ပါ...">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "sb_publishable_gIcm03LyduvN6WgwZek4_Q_ePBBJBUc"; // လုံခြုံရေးအတွက် နောက်ပိုင်းတွင် Backend သို့ ရွှေ့နိုင်သည်
    const genAI = new GoogleGenerativeAI(a3f15fcb78accdf934adaa19b2b39b5cc498d168);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    window.sendMessage = async function() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const message = input.value.trim();

        if (!message) return;

        // User Message ပြခြင်း
        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const prompt = `မင်းက Smart Bookshelf ဆိုတဲ့ စာအုပ်စင် Website ရဲ့ AI Assistant ဖြစ်ပါတယ်။ 
                           စာအုပ်အကြောင်းတွေ၊ စာဖတ်ခြင်းရဲ့ အကျိုးကျေးဇူးတွေကို မြန်မာလို အားပေးကူညီတဲ့ လေသံနဲ့ ဖြေပေးပါ။ 
                           မေးခွန်း: ${message}`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const aiText = response.text();

            // AI Message ပြခြင်း
            chatBox.innerHTML += `<div class="message ai-msg">${aiText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="message ai-msg">စိတ်မရှိပါနဲ့ဗျာ၊ တစ်ခုခု မှားယွင်းသွားလို့ပါ။</div>`;
        }
    }
</script>
</body>
</html>
