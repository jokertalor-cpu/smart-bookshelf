<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask AI - Smart Bookshelf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; }
        .chat-container { max-width: 600px; margin: 50px auto; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        .chat-header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.2rem; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 14px; }
        .user-msg { background: var(--primary); color: white; align-self: flex-end; border-radius: 18px 18px 2px 18px; }
        .ai-msg { background: #e9ecef; color: #333; align-self: flex-start; border-radius: 18px 18px 18px 2px; }
        .loading { color: #666; font-size: 12px; font-style: italic; display: none; }
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header"><i class="fas fa-robot"></i> Smart AI Assistant</div>
    <div id="chat-box">
        <div class="message ai-msg">မင်္ဂလာပါ! ကျွန်တော်က Smart Bookshelf ရဲ့ AI ဖြစ်ပါတယ်။ စာအုပ်တွေအကြောင်း ဘာများမေးချင်ပါသလဲ?</div>
        <div id="ai-loading" class="loading">AI စဉ်းစားနေသည်...</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="ဒီမှာ မေးခွန်းရိုက်ပါ..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
<script>
    const GROQ_API_KEY = "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";

    window.sendMessage = async function() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const loading = document.getElementById('ai-loading');
        const message = input.value.trim();

        if (!message) return;

        // User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.textContent = message;
        chatBox.insertBefore(userDiv, loading);
        
        input.value = '';
        loading.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "မင်းက Smart Bookshelf ရဲ့ AI Assistant ဖြစ်ပါတယ်။ စာအုပ်အကြောင်းတွေကို မြန်မာလို အားပေးကူညီတဲ့ လေသံနဲ့ ဖြေပေးပါ။" },
                        { role: "user", content: message }
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.textContent = aiText;
            chatBox.insertBefore(aiDiv, loading);
        } catch (error) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message ai-msg';
            errorDiv.style.color = 'red';
            errorDiv.textContent = "အမှားတစ်ခု ရှိနေပါသည်။ နောက်မှ ပြန်စမ်းကြည့်ပါ။";
            chatBox.insertBefore(errorDiv, loading);
        } finally {
            loading.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
</script>
</body>
</html>
