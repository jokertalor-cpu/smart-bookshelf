<div class="admin-container">
    <div id="book-form-section" style="background: #f9f9f9; padding: 20px; border-radius: 8px;">
        <h3 id="form-title">Add / Edit Book</h3>
        <input type="hidden" id="edit-book-id">
        
        <div class="form-group">
            <label>စာအုပ်အမည် (Title)</label>
            <input type="text" id="title">
        </div>
        <div class="form-group">
            <label>အမျိုးအစား (Category)</label>
            <select id="category">
                <option value="Xianxia">Xianxia</option>
                <option value="System">System</option>
                <option value="Knowledge">Knowledge</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Translation">Translation</option>
                <option value="Action">Action</option>
                <option value="Romance">Romance</option>
            </select>
        </div>
        <div class="form-group">
            <label>စာရေးသူ (Author)</label>
            <input type="text" id="author">
        </div>
        <div class="form-group">
            <label>Cover Image URL (Direct Link သာထည့်ပါ)</label>
            <input type="text" id="cover-url" placeholder="https://example.com/image.jpg">
        </div>
        <div class="form-group">
            <label>File Size (ဥပမာ - 1.5 MB)</label>
            <input type="text" id="file-size">
        </div>
        <div class="form-group">
            <label>Download Link (Direct Link)</label>
            <input type="text" id="download-link">
        </div>
        <div class="form-group">
            <label>Read Link (Online ဖတ်ရန် Link)</label>
            <input type="text" id="read-link">
        </div>
        <div class="form-group">
            <input type="checkbox" id="is-editor-choice">
            <label style="display:inline;"> Editor's Choice</label>
        </div>
        
        <button class="btn-main" id="upload-btn" onclick="uploadBook()">Save Book</button>
        <button onclick="resetForm()" id="cancel-btn" style="display:none;">Cancel</button>
    </div>
</div>
